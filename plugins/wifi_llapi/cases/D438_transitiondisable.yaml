id: d438-security-transitiondisable
name: "D438 Security TransitionDisable"
version: '1.1'
source:
  row: 438
  object: WiFi.AccessPoint.{i}.Security.
  api: TransitionDisable
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.*.Security.TransitionDisable=WPA3-Personal"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; TransitionDisable is calibrated as an AP-only Security setter/getter + hostapd case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 primary + AP2 peer / SSID.4 + SSID.5 / testpilot5G WPA2 baseline with default `TransitionDisable=""`
  - 6G: DUT wl1 / AP3 primary + AP4 peer / SSID.6 + SSID.7 / testpilot6G WPA3 baseline with quoted `SAEPassphrase="00000000"` and default `TransitionDisable=""`
  - 2.4G: DUT wl2 / AP5 primary + AP6 peer / SSID.8 + SSID.9 / testpilot2G WPA2 baseline with default `TransitionDisable=""`
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing `Security.TransitionDisable`
  - workbook row 438 validates hostapd `transition_disable=` bit mapping after wildcard setters; current 0403 live probe exact-closed the same mapping after a 6-second settle window
  - supported options on the current DUT are `WPA3-Personal` -> `transition_disable=1`, `SAE-PK` -> `transition_disable=2`, `EnhancedOpen` -> `transition_disable=8`, and empty string -> `ABSENT`
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented baseline
     - restore AP1 / AP2 / AP5 / AP6 to `ModeEnabled=WPA2-Personal` with `SAEPassphrase=password`
     - restore AP3 / AP4 to `ModeEnabled=WPA3-Personal` with quoted `SAEPassphrase="00000000"`
     - clear wildcard `TransitionDisable=""`
     - capture getter + hostapd `transition_disable=` baseline on wl0 / wl1 / wl2
  2) Workbook replay:
     - set wildcard `TransitionDisable=WPA3-Personal`, wait 6 seconds, then verify AP1 / AP3 / AP5 getter and wl0 / wl1 / wl2 hostapd `transition_disable=1`
     - set wildcard `TransitionDisable=SAE-PK`, wait 6 seconds, then verify getter and hostapd `transition_disable=2`
     - set wildcard `TransitionDisable=EnhancedOpen`, wait 6 seconds, then verify getter and hostapd `transition_disable=8`
  3) Restore path:
     - clear wildcard `TransitionDisable=""`
     - wait 6 seconds, then verify getter returns empty string and hostapd removes `transition_disable=` on wl0 / wl1 / wl2
  4) Verdict model:
     - this is a workbook-preserving `Pass` checkpoint
     - the case passes only when getter + hostapd exact-close `"" -> WPA3-Personal/1 -> SAE-PK/2 -> EnhancedOpen/8 -> ""/ABSENT` on all three bands
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA2-Personal
    ubus-cli WiFi.AccessPoint.2.Security.ModeEnabled=WPA2-Personal
    ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.4.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.5.Security.ModeEnabled=WPA2-Personal
    ubus-cli WiFi.AccessPoint.6.Security.ModeEnabled=WPA2-Personal
    ubus-cli WiFi.AccessPoint.1.Security.SAEPassphrase=password
    ubus-cli WiFi.AccessPoint.2.Security.SAEPassphrase=password
    ubus-cli 'WiFi.AccessPoint.3.Security.SAEPassphrase="00000000"'
    ubus-cli 'WiFi.AccessPoint.4.Security.SAEPassphrase="00000000"'
    ubus-cli WiFi.AccessPoint.5.Security.SAEPassphrase=password
    ubus-cli WiFi.AccessPoint.6.Security.SAEPassphrase=password
    ubus-cli "WiFi.AccessPoint.*.Security.TransitionDisable="
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Capture baseline getter + hostapd `transition_disable=` on AP1 / AP3 / AP5.
  2) Set wildcard `TransitionDisable=WPA3-Personal`, wait 6 seconds, and re-read getter / hostapd state.
  3) Set wildcard `TransitionDisable=SAE-PK`, wait 6 seconds, and re-read getter / hostapd state.
  4) Set wildcard `TransitionDisable=EnhancedOpen`, wait 6 seconds, and re-read getter / hostapd state.
  5) Clear wildcard `TransitionDisable=""`, wait 6 seconds, and re-read getter / hostapd baseline again.
  Verdict: Pass. The current DUT exactly closes workbook row 438 when all three bands follow the same getter + hostapd bit mapping `"" -> WPA3-Personal/1 -> SAE-PK/2 -> EnhancedOpen/8 -> ""/ABSENT`.

steps:
- id: step1_transitiondisable_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.Security.TransitionDisable?" 2>&1); C=$(printf
    '%s\n' "$OUT" | grep -c '^WiFi\.AccessPoint\.1\.Security\.TransitionDisable=');
    VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.Security\.TransitionDisable="\([^"]*\)".*/\1/p'
    | head -n 1); HAPD=$(grep -m1 '^transition_disable=' /tmp/wl0_hapd.conf 2>/dev/null
    | cut -d= -f2- | xargs || true); if [ "$C" -gt 0 ]; then printf 'BaselineGetterTransitionDisable5g="%s"\n'
    "$VALUE"; else echo 'BaselineGetterTransitionDisable5g=ABSENT'; fi; if [ -n "$HAPD"
    ]; then printf 'BaselineHostapdTransitionDisable5g=%s\n' "$HAPD"; else echo 'BaselineHostapdTransitionDisable5g=ABSENT';
    fi
  capture: transitiondisable_baseline_5g
