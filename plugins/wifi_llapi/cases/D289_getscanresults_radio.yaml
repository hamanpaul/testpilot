id: d289-getscanresults-radio
name: D289 getScanResults Radio
source:
  row: 289
  object: WiFi.Radio.{i}.
  api: getScanResults()
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_scan
  target: dut
  action: exec
  capture: scan_5g
  command: 'VAL=$(ubus-cli "WiFi.Radio.1.getScanResults()" | sed -n ''s/^[[:space:]]*Radio = "\([^"]*\)".*/\1/p'' | head -n1); printf "Radio=%s\n" "$VAL"'
  expected: 5G neighboring scan 缺少 Radio backing field 時，live shape 應正規化成空字串
  description: Radio.1 (5g) 擷取 neighboring scan 的 Radio live shape
- id: step_6g_scan
  target: dut
  action: exec
  capture: scan_6g
  command: 'VAL=$(ubus-cli "WiFi.Radio.2.getScanResults()" | sed -n ''s/^[[:space:]]*Radio = "\([^"]*\)".*/\1/p'' | head -n1); printf "Radio=%s\n" "$VAL"'
  expected: 6G neighboring scan 缺少 Radio backing field 時，live shape 應正規化成空字串
  description: Radio.2 (6g) 擷取 neighboring scan 的 Radio live shape
- id: step_24g_scan
  target: dut
  action: exec
  capture: scan_24g
  command: 'VAL=$(ubus-cli "WiFi.Radio.3.getScanResults()" | sed -n ''s/^[[:space:]]*Radio = "\([^"]*\)".*/\1/p'' | head -n1); printf "Radio=%s\n" "$VAL"'
  expected: 2.4G neighboring scan 缺少 Radio backing field 時，live shape 應正規化成空字串
  description: Radio.3 (2.4g) 擷取 neighboring scan 的 Radio live shape
pass_criteria:
- field: scan_5g.Radio
  operator: equals
  value: ''
  description: 5G active scanresult model 未提供 Radio 欄位，正規化後應維持空字串
- field: scan_6g.Radio
  operator: equals
  value: ''
  description: 6G active scanresult model 未提供 Radio 欄位，正規化後應維持空字串
- field: scan_24g.Radio
  operator: equals
  value: ''
  description: 2.4G active scanresult model 未提供 Radio 欄位，正規化後應維持空字串
