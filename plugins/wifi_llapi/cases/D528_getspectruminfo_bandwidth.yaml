id: d528-spectruminfo-bandwidth
name: D528 getSpectrumInfo bandwidth
source:
  row: 528
  object: WiFi.Radio.{i}.getSpectrumInfo()
  api: bandwidth
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_method
  target: dut
  action: read
  capture: method_5g
  command: ubus-cli "WiFi.Radio.1.getSpectrumInfo()"
  expected: bandwidth 出現在回傳 array 中
  description: Radio.1 (5g) getSpectrumInfo → bandwidth
- id: step_6g_method
  target: dut
  action: read
  capture: method_6g
  command: ubus-cli "WiFi.Radio.2.getSpectrumInfo()"
  expected: bandwidth 出現在回傳 array 中
  description: Radio.2 (6g) getSpectrumInfo → bandwidth
- id: step_24g_method
  target: dut
  action: read
  capture: method_24g
  command: ubus-cli "WiFi.Radio.3.getSpectrumInfo()"
  expected: bandwidth 出現在回傳 array 中
  description: Radio.3 (2.4g) getSpectrumInfo → bandwidth
pass_criteria:
- field: method_5g.bandwidth
  operator: equals
  value: 20MHz
  description: 5g getSpectrumInfo() sync path serializes SWL_BW_20MHZ as the 
    cstring "20MHz".
- field: method_6g.bandwidth
  operator: equals
  value: 20MHz
  description: 6g getSpectrumInfo() sync path serializes SWL_BW_20MHZ as the 
    cstring "20MHz".
- field: method_24g.bandwidth
  operator: equals
  value: 20MHz
  description: 2.4g getSpectrumInfo() sync path serializes SWL_BW_20MHZ as the 
    cstring "20MHz".
