    | head -n 1); if [ -n "$ACL" ]; then printf 'BaselineMacaddrAcl24g=%s\n' "$ACL";
    else echo 'BaselineMacaddrAcl24g=ABSENT'; fi; if printf '%s\n' "$CFG" | grep -q
