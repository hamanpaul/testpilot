    sleep 5; OUT=$(ubus-cli "WiFi.AccessPoint.3.MBOEnable?" 2>&1); VALUE=$(printf
    '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.3\.MBOEnable=\([0-9][0-9]*\).*/\1/p'
    | head -n 1); if [ -n "$VALUE" ]; then printf 'AfterEnableGetterMbo6g=%s\n' "$VALUE";
    else echo 'AfterEnableGetterMbo6g=EMPTY'; fi; RAW=$(wl -i wl1 mbo ap_enable 2>&1);
    DRIVER=$(printf '%s\n' "$RAW" | sed -n 's/^MBO AP ENABLE : \([0-9][0-9]*\).*/\1/p'
    | head -n 1); if [ -n "$DRIVER" ]; then printf 'AfterEnableDriverMbo6g=%s\n' "$DRIVER";
    else echo 'AfterEnableDriverMbo6g=EMPTY'; fi
  depends_on: step7_mbo_enable_6g
