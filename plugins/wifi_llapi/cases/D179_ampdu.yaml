   capture: after_restore_24g
   command:
     - sleep 10
     - ubus-cli "WiFi.Radio.3.DriverConfig.Ampdu?" | sed -n 's/^WiFi\.Radio\.3\.DriverConfig\.Ampdu=\(-\?[0-9][0-9]*\)$/AfterRestoreGetterAmpdu24g=\1/p'
