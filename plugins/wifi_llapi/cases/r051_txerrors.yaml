id: wifi-llapi-r051-accesspoint_associateddevice-txerrors
name: TxErrors — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 51
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: TxErrors
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.TxErrors=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: Connect WiFi station to GW SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run IPERF between Stations
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify TxErrors
  capture: result
  depends_on: step2
pass_criteria:
- field: result.TxErrors
  operator: contains
  value: '0'
  description: TxErrors 應回傳包含 TxErrors=0
verification_command: 'root@prplOS:/# wl -i wl0 sta_info DE:B4:40:A6:40:D5 | grep tx

