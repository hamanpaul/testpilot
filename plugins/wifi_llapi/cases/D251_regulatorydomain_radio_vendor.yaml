  expected: 6g setter 應接受 8
  depends_on: step8_regrev_default_6g
  description: Radio.2 (6g) 將 RegulatoryDomainRev 設為 8。
- id: step10_regrev_after_set_6g
  target: DUT
  action: exec
  band: 6g
  capture: after_set_6g
