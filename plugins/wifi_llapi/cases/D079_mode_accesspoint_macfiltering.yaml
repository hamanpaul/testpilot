- field: mode_after_set_24g.AfterAclState24g
  operator: equals
  reference: mode_baseline_24g.BaselineAclState24g
  description: 2.4G AP5 / wl2 ACL file state remains unchanged across the failed
    setter attempt.

verification_command:
- 'OUT=$(ubus-cli "WiFi.AccessPoint.1.MACFiltering.Mode?" 2>&1); MODE=$(printf ''%s\n''
  "$OUT" | sed -n ''s/^WiFi\.AccessPoint\.1\.MACFiltering\.Mode="\([^"]*\)".*/\1/p''
  | head -n 1); if [ -n "$MODE" ]; then printf ''BaselineMode5g=%s\n'' "$MODE"; else
  echo ''BaselineMode5g=EMPTY''; fi; grep -nE ''^(macaddr_acl|accept_mac_file|deny_mac_file)=''
  /tmp/wl0_hapd.conf 2>/dev/null || true'
