id: wifi-llapi-D007-kickstationreason
name: kickStationReason() — WiFi.AccessPoint.{i}.
version: '1.1'
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 3
  object: "WiFi.AccessPoint.{i}."
  api: "kickStationReason()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.{i}.kickStationReason(macaddress=<STA_MAC>,reason=<int>)"'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology:
  - DUT: COM0 (BGW720-300, AP role)
  - STA: COM1 (BCM board, STA role)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping (live verified 2026-03-16):
  - 5G:   DUT AP.1 / wl0 / SSID=TestPilot_5G   ↔ STA wl0 / MAC=2C:59:17:00:04:85
  - 6G:   DUT AP.3 / wl1 / SSID=TestPilot_BTM  ↔ STA wl1  [BLOCKER: MLO/BCME_NOTREADY]
  - 2.4G: DUT AP.5 / wl2 / SSID=TestPilot_24G  ↔ STA wl2 / MAC=2C:59:17:00:04:97

setup_steps: |
  Sequential per-band (5G → 6G-skip → 2.4G); no simultaneous multi-band connections.
  [5G]
  1) STA wl0 join DUT AP.1 (TestPilot_5G):
     wl -i wl0 down; sleep 1; wl -i wl0 up; sleep 1
     wl -i wl0 join TestPilot_5G imode bss; sleep 3
     wl -i wl0 status
  2) DUT AP.1 verify STA associated:
     ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.*.MACAddress?"
     ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DisassociationTime?"
  [6G] SKIP — BCME_NOTREADY (-17, cmd=23 WLC_SET_SSID) on wl1; MLO firmware does not
       support standalone 6G STA-mode association via wl join on this platform.
  [2.4G]
  1) STA wl2 join DUT AP.5 (TestPilot_24G, Open security):
     wl -i wl2 down; sleep 1; wl -i wl2 up; sleep 1
     wl -i wl2 join TestPilot_24G imode bss; sleep 3
     wl -i wl2 status
  2) DUT AP.5 verify STA associated:
     ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.*.MACAddress?"
     ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DisassociationTime?"

test_procedure: |
  For each active band (5G then 2.4G):
  1) STA joins target AP via: wl -i <iface> join <SSID> imode bss
     (Note: use wl join, not iw connect — iw doesn't handle Open/PSK uniformly on BCM)
  2) Record DisassociationTime before kick.
  3) DUT execute: ubus-cli "WiFi.AccessPoint.{i}.kickStationReason(macaddress=<STA_MAC>,reason=1)"
     - {i}=1 for 5G (STA_MAC=2C:59:17:00:04:85), {i}=5 for 2.4G (STA_MAC=2C:59:17:00:04:97)
     - Note: parameter name is 'macaddress' (all lowercase), unlike kickStation which uses 'MACAddress'
  4) Verify DisassociationTime has changed (new timestamp written by wld).
  5) Check DUT log for hostapd disassociation event.
  Pass: DisassociationTime changes AND hostapd logs 'IEEE 802.11: disassociated' for the STA MAC.
  Notes:
  - Fast reconnect on open AP is expected and does NOT invalidate the kick.
  - Returns [""] on success (empty string array).
  - WLC_SCB_DEAUTHENTICATE_FOR_REASON err -30 (BCME_BUSY) may appear in kernel log;
    this is driver-internal noise and does not indicate failure.

steps:
- id: step1_5g_sta_join
  action: exec
  target: STA
  band: 5g
  command: |
    wl -i wl0 down; sleep 1; wl -i wl0 up; sleep 1
    wl -i wl0 join TestPilot_5G imode bss; sleep 3
    wl -i wl0 status
- id: step2_5g_record_time
  action: exec
  target: DUT
  band: 5g
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  depends_on: step1_5g_sta_join
  capture: assoc_5g
- id: step3_5g_record_time
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step2_5g_record_time
  capture: before_5g
- id: step4_5g_kick
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.kickStationReason(macaddress=2C:59:17:00:04:85,reason=1)"'
  depends_on: step3_5g_record_time
- id: step5_5g_verify
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step4_5g_kick
  capture: after_5g
- id: step6_6g_skip
  action: skip
  target: DUT
  band: 6g
  reason: "BCME_NOTREADY (-17, cmd=23 WLC_SET_SSID) on wl1 — MLO firmware does not support standalone 6G STA-mode association"
- id: step7_24g_sta_join
  action: exec
  target: STA
  band: 2.4g
  command: |
    wl -i wl2 down; sleep 1; wl -i wl2 up; sleep 1
    wl -i wl2 join TestPilot_24G imode bss; sleep 3
    wl -i wl2 status
- id: step8_24g_assoc
  action: exec
  target: DUT
  band: 2.4g
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  depends_on: step7_24g_sta_join
  capture: assoc_24g
- id: step9_24g_record_time
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step8_24g_assoc
  capture: before_24g
- id: step10_24g_kick
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.kickStationReason(macaddress=2C:59:17:00:04:97,reason=1)"'
  depends_on: step9_24g_record_time
- id: step11_24g_verify
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step10_24g_kick
  capture: after_24g

pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: equals
  value: 2c:59:17:00:04:85
  description: "5G: kickStationReason() 前必須先確認 wl0 STA 已關聯"
- field: after_5g.DisassociationTime
  operator: not_equals
  reference: before_5g.DisassociationTime
  description: "5G: DisassociationTime must change after kickStationReason — STA was deauthenticated"
- field: assoc_24g.AssocMac24g
  operator: equals
  value: 2c:59:17:00:04:97
  description: "2.4G: kickStationReason() 前必須先確認 wl2 STA 已關聯"
- field: after_24g.DisassociationTime
  operator: not_equals
  reference: before_24g.DisassociationTime
  description: "2.4G: DisassociationTime must change after kickStationReason — STA was deauthenticated"

verification_command: |
  # DUT log after kick (check for hostapd disassociation events):
  logread | grep -E "wl0|wl2|kickStation|disassociated|Disassoc" | tail -20
  # DUT object readback:
  ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DisassociationTime?"
  ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DisassociationTime?"

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Blocker
    2.4g: Pass
    comment: >
      6G Blocker: BCME_NOTREADY (-17, cmd=23 WLC_SET_SSID) on STA wl1 when attempting
      standalone 6G STA-mode association. MLO-aware firmware does not support wl join on
      wl1 as standalone interface. Workbook v4.0.3 expects Pass/Pass/Pass.
      5G confirmed Pass (live 2026-03-16, DisassociationTime changed to 16:13:07Z).
      2.4G confirmed Pass (live 2026-03-16, DisassociationTime changed to 16:28:43Z).
