# Test case YAML 範本
# 每個 .yaml 檔描述一條 test case
# 以 _ 開頭的檔案會被 plugin 忽略

id: "template-example"
name: "Example test case"
version: "1.0"

source:
  report: "6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx"
  sheet: "Wifi_LLAPI"
  row: 0                             # 對應 xlsx 的行號

platform:
  prplos: "4.0.3"
  bdk: "6.3.1"

# --- 拓撲與連線 ---
topology:
  links:
    - from: STA
      to: DUT
      band: "5g"                     # 2.4g / 5g / 6g
    - from: DUT
      to: EndpointPC
      interface: eth1

  devices:
    DUT:
      role: ap
      transport: serial
      config:
        - iface: "5g"
          mode: ap
          ssid: "{{SSID_5G}}"
          key: "{{KEY_5G}}"
          mlo: false
        - iface: wan
          type: ethernet
          port: eth0
        - iface: lan
          type: ethernet
          port: eth1

    STA:
      role: sta
      transport: adb
      config:
        - iface: "5g"
          mode: sta
          ssid: "{{SSID_5G}}"
          key: "{{KEY_5G}}"

    EndpointPC:
      role: endpoint
      transport: ssh
      config:
        - iface: eth0
          speed: "1G"

# --- 環境驗證 ---
env_verify:
  - action: ping
    from: STA
    to: DUT
    expect: pass

# --- 測試步驟 ---
steps:
  - id: step1
    action: exec
    target: DUT
    command: |
      echo "replace with actual test command"
    capture: result1

  - id: step2
    action: exec
    target: DUT
    command: |
      echo "replace with verification command"
    capture: result2
    depends_on: step1

# --- 通過條件 ---
pass_criteria:
  - field: result2
    operator: "contains"
    value: "expected output"
    description: "描述此條件驗證的目的"

# --- 測試頻段（可選，指定需要重複測試的頻段）---
bands: ["5g", "6g", "2.4g"]
