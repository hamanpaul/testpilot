id: wifi-llapi-r195-radio-getradiostats
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 195
  object: WiFi.Radio.{i}.
  api: getRadioStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getRadioStats()DiscardPacketsReceived : 0,'
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep DiscardPacketsReceived
  note: 'Record DiscardPacketsReceived:'
- id: step2
  action: exec
  target: DUT
  command: iperf3 -u -b 500M -t 30 -c <server_ip>
  depends_on: step1
  note: 'Use iperf3 to tansmit large pkgs from individual radios:'
- id: step3
  action: exec
  target: DUT
  command: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep DiscardPacketsReceived
  capture: result
  depends_on: step2
  note: 'Read DiscardPacketsReceived again:'
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error
verification_command: 'cat /proc/net/dev | grep wl*

  awk ''

  $1 ~ /^wl[0-2]:$/ {

  printf "%s RX_drop-pkg=%s\n", $1, $5

  }

  '' /proc/net/dev'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Committed
