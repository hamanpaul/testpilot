  description: SSID.8 (2.4g) driver AC_BK rx failed bytes
pass_criteria:
- field: direct_5g.AC_BK
  operator: equals
  reference: refresh_5g.GetSSIDStatsWmmFailedBytesReceived5g
  description: 5g direct Stats.WmmFailedBytesReceived.AC_BK must match getSSIDStats().WmmFailedBytesReceived.AC_BK after refresh.
- field: direct_5g.AC_BK
  operator: equals
  reference: driver_5g.DriverWmmFailedBytesReceived5g
  description: 5g direct Stats.WmmFailedBytesReceived.AC_BK must match wl0 wme_counters AC_BK rx failed bytes.
- field: direct_6g.AC_BK
  operator: equals
  reference: refresh_6g.GetSSIDStatsWmmFailedBytesReceived6g
  description: 6g direct Stats.WmmFailedBytesReceived.AC_BK must match getSSIDStats().WmmFailedBytesReceived.AC_BK after refresh.
- field: direct_6g.AC_BK
  operator: equals
  reference: driver_6g.DriverWmmFailedBytesReceived6g
  description: 6g direct Stats.WmmFailedBytesReceived.AC_BK must match wl1 wme_counters AC_BK rx failed bytes.
- field: direct_24g.AC_BK
  operator: equals
  reference: refresh_24g.GetSSIDStatsWmmFailedBytesReceived24g
  description: 2.4g direct Stats.WmmFailedBytesReceived.AC_BK must match getSSIDStats().WmmFailedBytesReceived.AC_BK after refresh.
- field: direct_24g.AC_BK
  operator: equals
  reference: driver_24g.DriverWmmFailedBytesReceived24g
  description: 2.4g direct Stats.WmmFailedBytesReceived.AC_BK must match wl2 wme_counters AC_BK rx failed bytes.
verification_command:
  - 'ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n ''/WmmFailedBytesReceived = {/,/}/s/^[[:space:]]*AC_BK = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedBytesReceived5g=\1/p'''
  - 'ubus-cli "WiFi.SSID.4.Stats.WmmFailedBytesReceived.AC_BK?"'
  - 'wl -i wl0 wme_counters | grep -A2 ''^AC_BK:'' | awk ''/rx frames:/ {print "DriverWmmFailedBytesReceived5g="$11}'''
  - 'ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n ''/WmmFailedBytesReceived = {/,/}/s/^[[:space:]]*AC_BK = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedBytesReceived6g=\1/p'''
  - 'ubus-cli "WiFi.SSID.6.Stats.WmmFailedBytesReceived.AC_BK?"'
  - 'wl -i wl1 wme_counters | grep -A2 ''^AC_BK:'' | awk ''/rx frames:/ {print "DriverWmmFailedBytesReceived6g="$11}'''
  - 'ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n ''/WmmFailedBytesReceived = {/,/}/s/^[[:space:]]*AC_BK = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedBytesReceived24g=\1/p'''
  - 'ubus-cli "WiFi.SSID.8.Stats.WmmFailedBytesReceived.AC_BK?"'
  - 'wl -i wl2 wme_counters | grep -A2 ''^AC_BK:'' | awk ''/rx frames:/ {print "DriverWmmFailedBytesReceived24g="$11}'''
