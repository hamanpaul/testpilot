pass_criteria:
- field: default_5g.DefRegRev5g
  operator: equals
  value: '0'
  description: 5g 預設 RegulatoryDomainRev 應為 0。
- field: set_5g.ReqRegRev5g
  operator: equals
  value: '8'
  description: 5g setter 請求值應為 8。
- field: after_set_5g.AfterSetRegRev5g
  operator: equals
  value: '8'
  description: 5g setter=8 後 getter 應回報 8。
- field: supported_5g.RegDomSupported5g
  operator: regex
  value: .*#a.*
  description: 5g supported list 應維持非空且包含 #a。
- field: country_5g.Country5g
  operator: equals
  value: '#a (#a/0) <unknown>'
