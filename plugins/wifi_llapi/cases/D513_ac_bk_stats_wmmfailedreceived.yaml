id: d513-ssid-wmm-ac_bk_stats_wmmfailedreceived
name: D513 WmmFailedReceived.AC_BK
source:
  row: 513
  object: WiFi.SSID.{i}.Stats.WmmFailedReceived.
  api: AC_BK
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_refresh
  target: dut
  action: exec
  capture: refresh_5g
  command: ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n '/WmmFailedReceived = 
    {/,/}/s/^[[:space:]]*AC_BK = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedReceived5g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedReceived.AC_BK
  description: SSID.4 (5g) getSSIDStats() WmmFailedReceived.AC_BK refresh
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.SSID.4.Stats.WmmFailedReceived.AC_BK?"'
  expected: Stats.WmmFailedReceived.AC_BK getter 回傳有效值
  description: SSID.4 (5g) direct Stats.WmmFailedReceived.AC_BK
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 wme_counters | grep -A2 '^AC_BK:' | awk '/rx frames:/ 
    {print "DriverWmmFailedReceived5g="$8}'
  expected: wl0 wme_counters 匯出 AC_BK rx failed frames
  description: SSID.4 (5g) driver AC_BK rx failed frames
- id: step_6g_refresh
  target: dut
  action: exec
  capture: refresh_6g
  command: ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n '/WmmFailedReceived = 
    {/,/}/s/^[[:space:]]*AC_BK = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedReceived6g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedReceived.AC_BK
  description: SSID.6 (6g) getSSIDStats() WmmFailedReceived.AC_BK refresh
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.SSID.6.Stats.WmmFailedReceived.AC_BK?"'
  expected: Stats.WmmFailedReceived.AC_BK getter 回傳有效值
  description: SSID.6 (6g) direct Stats.WmmFailedReceived.AC_BK
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 wme_counters | grep -A2 '^AC_BK:' | awk '/rx frames:/ 
    {print "DriverWmmFailedReceived6g="$8}'
  expected: wl1 wme_counters 匯出 AC_BK rx failed frames
  description: SSID.6 (6g) driver AC_BK rx failed frames
- id: step_24g_refresh
  target: dut
  action: exec
  capture: refresh_24g
  command: ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n '/WmmFailedReceived = 
    {/,/}/s/^[[:space:]]*AC_BK = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedReceived24g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedReceived.AC_BK
  description: SSID.8 (2.4g) getSSIDStats() WmmFailedReceived.AC_BK refresh
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.SSID.8.Stats.WmmFailedReceived.AC_BK?"'
  expected: Stats.WmmFailedReceived.AC_BK getter 回傳有效值
  description: SSID.8 (2.4g) direct Stats.WmmFailedReceived.AC_BK
- id: step_24g_driver
  target: dut
  action: exec
  capture: driver_24g
  command: wl -i wl2 wme_counters | grep -A2 '^AC_BK:' | awk '/rx frames:/ 
    {print "DriverWmmFailedReceived24g="$8}'
  expected: wl2 wme_counters 匯出 AC_BK rx failed frames
  description: SSID.8 (2.4g) driver AC_BK rx failed frames
pass_criteria:
- field: direct_5g.AC_BK
  operator: equals
  reference: refresh_5g.GetSSIDStatsWmmFailedReceived5g
  description: 5g direct Stats.WmmFailedReceived.AC_BK must match 
    getSSIDStats().WmmFailedReceived.AC_BK after refresh.
- field: direct_5g.AC_BK
  operator: equals
  reference: driver_5g.DriverWmmFailedReceived5g
  description: 5g direct Stats.WmmFailedReceived.AC_BK must match wl0 
    wme_counters AC_BK rx failed frames.
- field: direct_6g.AC_BK
  operator: equals
  reference: refresh_6g.GetSSIDStatsWmmFailedReceived6g
  description: 6g direct Stats.WmmFailedReceived.AC_BK must match 
    getSSIDStats().WmmFailedReceived.AC_BK after refresh.
- field: direct_6g.AC_BK
  operator: equals
  reference: driver_6g.DriverWmmFailedReceived6g
  description: 6g direct Stats.WmmFailedReceived.AC_BK must match wl1 
    wme_counters AC_BK rx failed frames.
- field: direct_24g.AC_BK
  operator: equals
  reference: refresh_24g.GetSSIDStatsWmmFailedReceived24g
  description: 2.4g direct Stats.WmmFailedReceived.AC_BK must match 
    getSSIDStats().WmmFailedReceived.AC_BK after refresh.
- field: direct_24g.AC_BK
  operator: equals
  reference: driver_24g.DriverWmmFailedReceived24g
  description: 2.4g direct Stats.WmmFailedReceived.AC_BK must match wl2 
    wme_counters AC_BK rx failed frames.
verification_command:
- 'ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n ''/WmmFailedReceived = {/,/}/s/^[[:space:]]*AC_BK
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedReceived5g=\1/p'''
- 'ubus-cli "WiFi.SSID.4.Stats.WmmFailedReceived.AC_BK?"'
- 'wl -i wl0 wme_counters | grep -A2 ''^AC_BK:'' | awk ''/rx frames:/ {print "DriverWmmFailedReceived5g="$8}'''
- 'ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n ''/WmmFailedReceived = {/,/}/s/^[[:space:]]*AC_BK
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedReceived6g=\1/p'''
- 'ubus-cli "WiFi.SSID.6.Stats.WmmFailedReceived.AC_BK?"'
- 'wl -i wl1 wme_counters | grep -A2 ''^AC_BK:'' | awk ''/rx frames:/ {print "DriverWmmFailedReceived6g="$8}'''
- 'ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n ''/WmmFailedReceived = {/,/}/s/^[[:space:]]*AC_BK
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedReceived24g=\1/p'''
- 'ubus-cli "WiFi.SSID.8.Stats.WmmFailedReceived.AC_BK?"'
- 'wl -i wl2 wme_counters | grep -A2 ''^AC_BK:'' | awk ''/rx frames:/ {print "DriverWmmFailedReceived24g="$8}'''
