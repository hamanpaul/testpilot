id: wifi-llapi-r182-radio-txchainctrl
name: TxChainCtrl — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 182
  object: WiFi.Radio.{i}.
  api: TxChainCtrl
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.TxChainCtrl=-1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.TxChainCtrl?
  note: Get default Radio TxChainCtrl
- id: step2
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.1.TxChainCtrl=3
  capture: result
  depends_on: step1
  note: Set Radio TxChainCtrl to 3 then verify the setting in the driver
pass_criteria:
- field: result.TxChainCtrl
  operator: contains
  value: '-1'
  description: TxChainCtrl 應回傳包含 TxChainCtrl=-1
verification_command: 'Default:

  root@prplOS:/# wl -i wl0 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl1 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl2 txchain

  15 (0xf)


  TxChainCtrl=3

  root@prplOS:/# wl -i wl0 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl1 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl2 txchain

  15 (0xf)'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : the value in the driver always 15 (0xf)'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Need to commit
