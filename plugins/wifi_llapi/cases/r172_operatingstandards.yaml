id: wifi-llapi-r172-radio-operatingstandards
name: OperatingStandards — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 172
  object: WiFi.Radio.{i}.
  api: OperatingStandards
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.OperatingStandards=ax
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.Radio.1.OperatingStandards=be

    ubus-cli WiFi.Radio.2.OperatingStandards=be

    ubus-cli WiFi.Radio.3.OperatingStandards=be'
  note: 'Try change all radio to BE standard:'
- id: step2
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.OperatingStandards?
  depends_on: step1
  note: 'Check standard:'
- id: step3
  action: exec
  target: DUT
  command: 'Capture air beacon, the EHT IE should contained(Ext Tag: EHT Capabilities (802.11be D3.0) & Ext Tag: EHT Operation
    (802.11be D3.0)).'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.OperatingStandards=ax
  depends_on: step3
  note: 'Change all radio to AX standard:'
- id: step5
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.OperatingStandards?
  depends_on: step4
  note: 'Check standard:'
- id: step6
  action: exec
  target: DUT
  command: 'Capture air beacon, the EHT IE should not contained(Ext Tag: EHT Capabilities (802.11be D3.0) & Ext Tag: EHT Operation
    (802.11be D3.0)) and should contained HE IE.'
  depends_on: step5
- id: step7
  action: exec
  target: DUT
  command: Switch according to the 802.11 standard supported by each radio and verify each one individually-
  capture: result
  depends_on: step6
pass_criteria:
- field: result.OperatingStandards
  operator: contains
  value: ax
  description: OperatingStandards 應回傳包含 OperatingStandards=ax
verification_command: '[BE]

  wl -i wl[i] status

  wl -i wl[i] nmode

  wl -i wl[i] vhtmode

  wl -i wl[i] he features

  wl -i wl[i] eht features


  root@prplOS:/# wl -i wl0 status

  SSID: "AAA_ATnT-wl0"

  Mode: Managed RSSI: 0 dBm SNR: 0 dB noise: -99 dBm Channel: 36

