  expected: 6g setter=8 後 getter 應回報 8
  depends_on: step9_regrev_set_6g
  description: Radio.2 (6g) setter=8 後驗證 getter readback。
- id: step11_regdom_supported_6g
  target: DUT
  action: exec
  band: 6g
  capture: supported_6g
  command: >-
    ubus-cli "WiFi.Radio.2.Vendor.Brcm.RegulatoryDomainSupported?" | sed -n 's/.*="\([^"]*\)".*/RegDomSupported6g=\1/p'
  expected: 6g supported list 應維持有效且包含 #a
  depends_on: step10_regrev_after_set_6g
  description: Radio.2 (6g) 捕捉 RegulatoryDomainSupported 清單。
- id: step12_country_6g
  target: DUT
  action: exec
  band: 6g
  capture: country_6g
  command: >-
