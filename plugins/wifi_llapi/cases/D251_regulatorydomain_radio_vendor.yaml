  expected: 6g restore 應接受 0
  depends_on: step12_country_6g
  description: Radio.2 (6g) restore 回 0。
- id: step14_regrev_after_restore_6g
  target: DUT
  action: exec
  band: 6g
  capture: after_restore_6g
  command:
  - sleep 5
  - >-
    ubus-cli "WiFi.Radio.2.Vendor.Brcm.RegulatoryDomainRev?" | sed -n 's/.*=\([0-9][0-9]*\).*/AfterRestoreRegRev6g=\1/p'
  expected: 6g restore 後 getter 應回報 0
  depends_on: step13_regrev_restore_6g
  description: Radio.2 (6g) restore 後再次確認 getter。
- id: step15_regrev_default_24g
  target: DUT
  action: exec
  band: 2.4g
  capture: default_24g
