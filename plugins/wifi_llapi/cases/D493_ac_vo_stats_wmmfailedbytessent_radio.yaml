id: d493-radio-stats-wmmfailedbytessent-ac_vo
name: D493 Radio Stats WmmFailedbytesSent AC_VO
source:
  row: 493
  object: WiFi.Radio.{i}.Stats.WmmFailedbytesSent.
  api: AC_VO
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.Radio.1.Stats.WmmFailedbytesSent.AC_VO?"'
  expected: Stats.WmmFailedbytesSent.AC_VO getter 回傳有效值
  description: Radio.1 (5g) direct Stats.WmmFailedbytesSent.AC_VO
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 wme_counters | grep '^AC_VO:' | awk '{print "DriverWmmFailedbytesSent5g="$12}'
  expected: wl0 wme_counters 匯出 AC_VO tx failed bytes
  description: Radio.1 (5g) driver AC_VO tx failed bytes
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.Radio.2.Stats.WmmFailedbytesSent.AC_VO?"'
  expected: Stats.WmmFailedbytesSent.AC_VO getter 回傳有效值
  description: Radio.2 (6g) direct Stats.WmmFailedbytesSent.AC_VO
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 wme_counters | grep '^AC_VO:' | awk '{print "DriverWmmFailedbytesSent6g="$12}'
  expected: wl1 wme_counters 匯出 AC_VO tx failed bytes
  description: Radio.2 (6g) driver AC_VO tx failed bytes
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.Radio.3.Stats.WmmFailedbytesSent.AC_VO?"'
  expected: Stats.WmmFailedbytesSent.AC_VO getter 回傳有效值
  description: Radio.3 (2.4g) direct Stats.WmmFailedbytesSent.AC_VO
- id: step_24g_driver
  target: dut
  action: exec
  capture: driver_24g
  command: wl -i wl2 wme_counters | grep '^AC_VO:' | awk '{print "DriverWmmFailedbytesSent24g="$12}'
  expected: wl2 wme_counters 匯出 AC_VO tx failed bytes
  description: Radio.3 (2.4g) driver AC_VO tx failed bytes
pass_criteria:
- field: direct_5g.AC_VO
  operator: equals
  reference: driver_5g.DriverWmmFailedbytesSent5g
  description: 5g direct Stats.WmmFailedbytesSent.AC_VO must match wl0 wme_counters AC_VO tx failed bytes.
- field: direct_6g.AC_VO
  operator: equals
  reference: driver_6g.DriverWmmFailedbytesSent6g
  description: 6g direct Stats.WmmFailedbytesSent.AC_VO must match wl1 wme_counters AC_VO tx failed bytes.
- field: direct_24g.AC_VO
  operator: equals
  reference: driver_24g.DriverWmmFailedbytesSent24g
  description: 2.4g direct Stats.WmmFailedbytesSent.AC_VO must match wl2 wme_counters AC_VO tx failed bytes.
verification_command:
  - 'ubus-cli "WiFi.Radio.1.Stats.WmmFailedbytesSent.AC_VO?"'
  - 'wl -i wl0 wme_counters | grep ''^AC_VO:'' | awk ''{print "DriverWmmFailedbytesSent5g="$12}'''
  - 'ubus-cli "WiFi.Radio.2.Stats.WmmFailedbytesSent.AC_VO?"'
  - 'wl -i wl1 wme_counters | grep ''^AC_VO:'' | awk ''{print "DriverWmmFailedbytesSent6g="$12}'''
  - 'ubus-cli "WiFi.Radio.3.Stats.WmmFailedbytesSent.AC_VO?"'
  - 'wl -i wl2 wme_counters | grep ''^AC_VO:'' | awk ''{print "DriverWmmFailedbytesSent24g="$12}'''
