id: d188-radio-dtimperiod
name: D188 Radio DTIMPeriod
hlapi_command: ubus-cli WiFi.Radio.1.DTIMPeriod=7
source:
  row: 188
  object: WiFi.Radio.{i}.
  api: DTIMPeriod
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: workbook pass intent is setter-backed 3 -> 7 -> 3 with hostapd dtim_period readback
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
sta_env_setup: |
  DUT:
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.2.DTIMPeriod=3
    ubus-cli WiFi.Radio.3.DTIMPeriod=3
    sleep 3
steps:
- id: step1_dtim_baseline_getter_5g
  target: DUT
  action: read
  capture: baseline_getter_5g
  command: ubus-cli "WiFi.Radio.1.DTIMPeriod?"
  expected: 基線 DTIMPeriod 預設值應為 3
  description: Radio.1 (5g) 先確認 getter 基線為 3。
- id: step2_dtim_baseline_hostapd_5g
  target: DUT
  action: exec
  capture: baseline_hostapd_5g
  command: grep '^dtim_period=' /tmp/wl0_hapd.conf | sed -n '1s/^dtim_period=/BaselineHostapdDtimPeriod5g=/p'
  expected: hostapd dtim_period 基線值應為 3
  depends_on: step1_dtim_baseline_getter_5g
  description: Radio.1 (5g) hostapd config 基線應同步為 3。
- id: step3_dtim_set_5g
  target: DUT
  action: exec
  capture: set_5g
  command:
    - printf 'RequestedDtimPeriod5g=7\n'
    - ubus-cli WiFi.Radio.1.DTIMPeriod=7
  expected: setter 應接受 7
  depends_on: step2_dtim_baseline_hostapd_5g
  description: Radio.1 (5g) 將 DTIMPeriod 設為 7。
- id: step4_dtim_after_set_getter_5g
  target: DUT
  action: exec
  capture: after_set_getter_5g
  command: sleep 3; ubus-cli "WiFi.Radio.1.DTIMPeriod?"
  expected: getter 應回到 7
  depends_on: step3_dtim_set_5g
  description: Radio.1 (5g) setter 後 getter 應回 7。
- id: step5_dtim_after_set_hostapd_5g
  target: DUT
  action: exec
  capture: after_set_hostapd_5g
  command: grep '^dtim_period=' /tmp/wl0_hapd.conf | sed -n '1s/^dtim_period=/AfterSetHostapdDtimPeriod5g=/p'
  expected: hostapd dtim_period 應同步為 7
  depends_on: step4_dtim_after_set_getter_5g
  description: Radio.1 (5g) hostapd config 應同步切到 7。
- id: step6_dtim_restore_5g
  target: DUT
  action: exec
  capture: restore_5g
  command:
    - printf 'RestoreDtimPeriod5g=3\n'
    - ubus-cli WiFi.Radio.1.DTIMPeriod=3
  expected: setter 應接受 restore 3
  depends_on: step5_dtim_after_set_hostapd_5g
  description: Radio.1 (5g) 將 DTIMPeriod restore 回 3。
- id: step7_dtim_after_restore_getter_5g
  target: DUT
  action: exec
  capture: after_restore_getter_5g
  command: sleep 3; ubus-cli "WiFi.Radio.1.DTIMPeriod?"
  expected: getter 應回到 3
  depends_on: step6_dtim_restore_5g
  description: Radio.1 (5g) restore 後 getter 應回 3。
- id: step8_dtim_after_restore_hostapd_5g
  target: DUT
  action: exec
  capture: after_restore_hostapd_5g
  command: grep '^dtim_period=' /tmp/wl0_hapd.conf | sed -n '1s/^dtim_period=/AfterRestoreHostapdDtimPeriod5g=/p'
  expected: hostapd dtim_period 應同步回 3
  depends_on: step7_dtim_after_restore_getter_5g
  description: Radio.1 (5g) hostapd config 應同步回到 3。
