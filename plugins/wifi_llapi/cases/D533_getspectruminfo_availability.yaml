  expected: availability 出現在回傳 array 中
  description: Radio.2 (6g) getSpectrumInfo → availability
- id: step_24g_method
  target: dut
  action: read
  capture: method_24g
  command: ubus-cli "WiFi.Radio.3.getSpectrumInfo()"
  expected: availability 出現在回傳 array 中
  description: Radio.3 (2.4g) getSpectrumInfo → availability
pass_criteria:
- field: method_5g.availability
  operator: regex
  value: ^\d+$
- field: method_6g.availability
  operator: regex
  value: ^\d+$
- field: method_24g.availability
  operator: regex
