id: d519-ssid-wmm-ac_vo_stats_wmmfailedsent
name: D519 WmmFailedSent.AC_VO
source:
  row: 519
  object: WiFi.SSID.{i}.Stats.WmmFailedSent.
  api: AC_VO
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_refresh
  target: dut
  action: exec
  capture: refresh_5g
  command: ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n '/WmmFailedSent = 
    {/,/}/s/^[[:space:]]*AC_VO = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedSent5g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedSent.AC_VO
  description: SSID.4 (5g) getSSIDStats() WmmFailedSent.AC_VO refresh
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.SSID.4.Stats.WmmFailedSent.AC_VO?"'
  expected: Stats.WmmFailedSent.AC_VO getter 回傳有效值
  description: SSID.4 (5g) direct Stats.WmmFailedSent.AC_VO
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 wme_counters | grep '^AC_VO:' | awk '{print 
    "DriverWmmFailedSent5g="$9}'
  expected: wl0 wme_counters 匯出 AC_VO tx failed frames
  description: SSID.4 (5g) driver AC_VO tx failed frames
- id: step_6g_refresh
  target: dut
  action: exec
  capture: refresh_6g
  command: ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n '/WmmFailedSent = 
    {/,/}/s/^[[:space:]]*AC_VO = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedSent6g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedSent.AC_VO
  description: SSID.6 (6g) getSSIDStats() WmmFailedSent.AC_VO refresh
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.SSID.6.Stats.WmmFailedSent.AC_VO?"'
  expected: Stats.WmmFailedSent.AC_VO getter 回傳有效值
  description: SSID.6 (6g) direct Stats.WmmFailedSent.AC_VO
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 wme_counters | grep '^AC_VO:' | awk '{print 
    "DriverWmmFailedSent6g="$9}'
  expected: wl1 wme_counters 匯出 AC_VO tx failed frames
  description: SSID.6 (6g) driver AC_VO tx failed frames
- id: step_24g_refresh
  target: dut
  action: exec
  capture: refresh_24g
  command: ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n '/WmmFailedSent = 
    {/,/}/s/^[[:space:]]*AC_VO = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedSent24g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedSent.AC_VO
  description: SSID.8 (2.4g) getSSIDStats() WmmFailedSent.AC_VO refresh
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.SSID.8.Stats.WmmFailedSent.AC_VO?"'
  expected: Stats.WmmFailedSent.AC_VO getter 回傳有效值
  description: SSID.8 (2.4g) direct Stats.WmmFailedSent.AC_VO
- id: step_24g_driver
  target: dut
  action: exec
  capture: driver_24g
  command: wl -i wl2 wme_counters | grep '^AC_VO:' | awk '{print 
    "DriverWmmFailedSent24g="$9}'
  expected: wl2 wme_counters 匯出 AC_VO tx failed frames
  description: SSID.8 (2.4g) driver AC_VO tx failed frames
pass_criteria:
- field: direct_5g.AC_VO
  operator: equals
  reference: refresh_5g.GetSSIDStatsWmmFailedSent5g
  description: 5g direct Stats.WmmFailedSent.AC_VO must match 
    getSSIDStats().WmmFailedSent.AC_VO after refresh.
- field: direct_5g.AC_VO
  operator: equals
  reference: driver_5g.DriverWmmFailedSent5g
  description: 5g direct Stats.WmmFailedSent.AC_VO must match wl0 wme_counters 
    AC_VO tx failed frames.
- field: direct_6g.AC_VO
  operator: equals
  reference: refresh_6g.GetSSIDStatsWmmFailedSent6g
  description: 6g direct Stats.WmmFailedSent.AC_VO must match 
    getSSIDStats().WmmFailedSent.AC_VO after refresh.
- field: direct_6g.AC_VO
  operator: equals
  reference: driver_6g.DriverWmmFailedSent6g
  description: 6g direct Stats.WmmFailedSent.AC_VO must match wl1 wme_counters 
    AC_VO tx failed frames.
- field: direct_24g.AC_VO
  operator: equals
  reference: refresh_24g.GetSSIDStatsWmmFailedSent24g
  description: 2.4g direct Stats.WmmFailedSent.AC_VO must match 
    getSSIDStats().WmmFailedSent.AC_VO after refresh.
- field: direct_24g.AC_VO
  operator: equals
  reference: driver_24g.DriverWmmFailedSent24g
  description: 2.4g direct Stats.WmmFailedSent.AC_VO must match wl2 wme_counters
    AC_VO tx failed frames.
verification_command:
- 'ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n ''/WmmFailedSent = {/,/}/s/^[[:space:]]*AC_VO
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedSent5g=\1/p'''
- 'ubus-cli "WiFi.SSID.4.Stats.WmmFailedSent.AC_VO?"'
- 'wl -i wl0 wme_counters | grep ''^AC_VO:'' | awk ''{print "DriverWmmFailedSent5g="$9}'''
- 'ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n ''/WmmFailedSent = {/,/}/s/^[[:space:]]*AC_VO
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedSent6g=\1/p'''
- 'ubus-cli "WiFi.SSID.6.Stats.WmmFailedSent.AC_VO?"'
- 'wl -i wl1 wme_counters | grep ''^AC_VO:'' | awk ''{print "DriverWmmFailedSent6g="$9}'''
- 'ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n ''/WmmFailedSent = {/,/}/s/^[[:space:]]*AC_VO
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedSent24g=\1/p'''
- 'ubus-cli "WiFi.SSID.8.Stats.WmmFailedSent.AC_VO?"'
- 'wl -i wl2 wme_counters | grep ''^AC_VO:'' | awk ''{print "DriverWmmFailedSent24g="$9}'''
