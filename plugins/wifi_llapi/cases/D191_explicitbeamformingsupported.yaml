id: d191-radio-explicitbeamformingsupported
name: D191 Radio ExplicitBeamFormingSupported
source:
  row: 191
  object: WiFi.Radio.{i}.
  api: ExplicitBeamFormingSupported
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.ExplicitBeamFormingSupported?"
  expected: ExplicitBeamFormingSupported 回傳有效值
  description: Radio.1 (5g) 0 或 1 beamforming supported
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.ExplicitBeamFormingSupported?"
  expected: ExplicitBeamFormingSupported 回傳有效值
  description: Radio.2 (6g) 0 或 1 beamforming supported
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.ExplicitBeamFormingSupported?"
  expected: ExplicitBeamFormingSupported 回傳有效值
  description: Radio.3 (2.4g) 0 或 1 beamforming supported
pass_criteria:
- field: getter_5g.ExplicitBeamFormingSupported
  operator: regex
  value: ^[01]$
- field: getter_6g.ExplicitBeamFormingSupported
  operator: regex
  value: ^[01]$
- field: getter_24g.ExplicitBeamFormingSupported
  operator: regex
  value: ^[01]$
