id: d211-radio-operatingstandards
name: D211 Radio OperatingStandards
source:
  row: 172
  object: WiFi.Radio.{i}.
  api: OperatingStandards
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.OperatingStandards?"
  expected: OperatingStandards 回傳有效值
  description: Radio.1 (5g) OperatingStandards getter（live=be）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.OperatingStandards?"
  expected: OperatingStandards 回傳有效值
  description: Radio.2 (6g) OperatingStandards getter（live=be）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.OperatingStandards?"
  expected: OperatingStandards 回傳有效值
  description: Radio.3 (2.4g) OperatingStandards getter（live=be）
pass_criteria:
- field: getter_5g.OperatingStandards
  operator: regex
  value: ".+"
- field: getter_6g.OperatingStandards
  operator: regex
  value: ".+"
- field: getter_24g.OperatingStandards
  operator: regex
  value: ".+"
