id: wifi-llapi-r155-radio-guardinterval
name: GuardInterval — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 155
  object: WiFi.Radio.{i}.
  api: GuardInterval
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.GuardInterval=Auto
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: 'Setting value: ["400nsec''","800nsec","1xLTF_0.8us","1xLTF_1.6us","2xLTF_0.8us","2xLTF_1.6us","4xLTF_0.8us","4xLTF_1.6us","Auto"]'
- id: step2
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.GuardInterval?
  depends_on: step1
  note: Get GI Default value
- id: step3
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.GuardInterval="1xLTF_1.6us"
  depends_on: step2
  note: Try Set GI to "1xLTF_1.6us"
- id: step4
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.GuardInterval?
  capture: result
  depends_on: step3
  note: Verify GI settings
pass_criteria:
- field: result.GuardInterval
  operator: contains
  value: Auto
  description: GuardInterval 應回傳包含 GuardInterval=Auto
verification_command: 'BRCM: CSP CS00012439197


  --

  root@prplOS:/# wl -i wl0 nrate

  eht mcs 13 Nss 4 Tx Exp 0 bw160 2xLTF GI 0.8us auto

  root@prplOS:/# wl -i wl0 sgi_tx

  -1'
