  124 (0xd07c)

  128 (0xd080)'
results_reference:
  v4.0.1:
    5g: ''
    6g: Pass
    2.4g: Pass
    comment: 'BRCM: CSP CS00012439197


      --

      Under 6GHz 802.11be, bandwidth unable to set to 320MHz. The API keeps returns:

      ERROR: set WiFi.Radio.2.OperatingChannelBandwidth failed (10 - invalid value)

      Check with "wl -i wl1 chanspecs", 6GHz radio do support bandwidth 320MHz.'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'supported

      ubus-cli WiFi.Radio.1.Channel=121; ubus-cli WiFi.Radio.1.Operatin

      gChannelBandwidth="320MHz-1"'
