id: wifi-llapi-D008-sendbsstransferrequest
name: sendBssTransferRequest() — WiFi.AccessPoint.{i}.
version: '1.1'
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 4
  object: "WiFi.AccessPoint.{i}."
  api: "sendBssTransferRequest()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.sendBssTransferRequest(mac:string, target:string, class:int, channel:int, wait:int,
  retries:int, validity:int, disassoc:int, bssidInfo:uint32):bool
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology:
  - DUT: COM0 (BGW720-300, AP role)
  - STA: COM1 (BCM board, STA role)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping (live-verified 2026-03-16):
  - 5G:   DUT wl0 / AP.1  / SSID.4  "TestPilot_5G"   BSSID 2c:59:17:00:19:95
  - 6G:   DUT wl1 / AP.3  / SSID.6  BCME_NOTREADY blocker (STA cannot associate)
  - 2.4G: DUT wl2 / AP.5  / SSID.8  "TestPilot_24G"  BSSID 2c:59:17:00:19:a7
  STA MACs:
  - wl0 (5G)  → 2C:59:17:00:04:85  associated to AP.1
  - wl2 (2.4G)→ 2C:59:17:00:04:97  associated to AP.5
  Pre-requisites:
  - ubus-cli "WiFi.AccessPoint.1.MBOEnable=1"
  - ubus-cli "WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=25"
  - ubus-cli "WiFi.AccessPoint.5.MBOEnable=1"
  - ubus-cli "WiFi.AccessPoint.5.IEEE80211r.MobilityDomain=25"

test_procedure: |
  Each band tests AP.{i}.sendBssTransferRequest() independently.
  6G is skipped due to BCME_NOTREADY blocker (STA cannot associate to wl1).

  [5G — AP.1 / wl0]
  Pre-condition: STA 2C:59:17:00:04:85 associated to AP.1 (wl0)
  DUT:
    ubus-cli "WiFi.AccessPoint.1.sendBssTransferRequest(mac=2C:59:17:00:04:85,target=2c:59:17:00:19:a7,class=1,channel=36,wait=0,retries=1,validity=10,disassoc=1,bssidInfo=0)"
  Expected: returns [-1]  (BTM frame sent; STA did not ACK/roam — acceptable per JIRA BCAWLAN-285329)

  [6G — AP.3 / wl1 — SKIP]
  Reason: wl1 join fails with WLC_SET_SSID BCME_NOTREADY (-17, cmd=23); STA cannot associate to AP.3.

  [2.4G — AP.5 / wl2]
  Pre-condition: STA 2C:59:17:00:04:97 associated to AP.5 (wl2)
  DUT:
    ubus-cli "WiFi.AccessPoint.5.sendBssTransferRequest(mac=2C:59:17:00:04:97,target=2c:59:17:00:19:95,class=1,channel=36,wait=0,retries=1,validity=10,disassoc=1,bssidInfo=0)"
  Expected: returns [-1]  (same as 5G)

steps:
- id: step1_5g_prep
  band: 5g
  action: exec
  target: DUT
  command: |
    ubus-cli "WiFi.AccessPoint.1.MBOEnable=1"
    ubus-cli "WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=25"
- id: step2_5g_sta_join
  band: 5g
  action: exec
  target: STA
  command: |
    wl -i wl0 down; sleep 1; wl -i wl0 up; sleep 1
    wl -i wl0 join TestPilot_5G imode bss; sleep 3
    wl -i wl0 status
- id: step3_5g_assoc
  band: 5g
  action: exec
  target: DUT
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  depends_on: step2_5g_sta_join
  capture: assoc_5g
- id: step4_5g
  band: 5g
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.AccessPoint.1.sendBssTransferRequest(mac=2C:59:17:00:04:85,target=2c:59:17:00:19:a7,class=1,channel=36,wait=0,retries=1,validity=10,disassoc=1,bssidInfo=0)"'
  depends_on: step3_5g_assoc
  capture: result_5g
- id: step5_6g
  band: 6g
  action: skip
  target: DUT
  reason: "BCME_NOTREADY: STA cannot associate to AP.3 (wl1); blocker confirmed 2026-03-16"
  result: Blocker
- id: step6_24g_prep
  band: 2.4g
  action: exec
  target: DUT
  command: |
    ubus-cli "WiFi.AccessPoint.5.MBOEnable=1"
    ubus-cli "WiFi.AccessPoint.5.IEEE80211r.MobilityDomain=25"
- id: step7_24g_sta_join
  band: 2.4g
  action: exec
  target: STA
  command: |
    wl -i wl2 down; sleep 1; wl -i wl2 up; sleep 1
    wl -i wl2 join TestPilot_24G imode bss; sleep 3
    wl -i wl2 status
- id: step8_24g_assoc
  band: 2.4g
  action: exec
  target: DUT
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  depends_on: step7_24g_sta_join
  capture: assoc_24g
- id: step9_24g
  band: 2.4g
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.AccessPoint.5.sendBssTransferRequest(mac=2C:59:17:00:04:97,target=2c:59:17:00:19:95,class=1,channel=36,wait=0,retries=1,validity=10,disassoc=1,bssidInfo=0)"'
  depends_on: step8_24g_assoc
  capture: result_24g

pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: equals
  value: 2c:59:17:00:04:85
  description: 5G must first resolve the expected STA association on wl0.
- field: result_5g
  operator: not_contains
  value: ERROR
  description: 5G sendBssTransferRequest() 不應回傳 LLAPI ERROR
- field: result_5g
  operator: not_contains
  value: syntax error
  description: 5G sendBssTransferRequest() 不應因 shell syntax error 失敗
- field: result_5g
  operator: contains
  value: '[-1]'
  description: 5G sendBssTransferRequest() 應回傳 [-1]，表示 BTM frame 已送出。
- field: assoc_24g.AssocMac24g
  operator: equals
  value: 2c:59:17:00:04:97
  description: 2.4G must first resolve the expected STA association on wl2.
- field: result_24g
  operator: not_contains
  value: ERROR
  description: 2.4G sendBssTransferRequest() 不應回傳 LLAPI ERROR
- field: result_24g
  operator: not_contains
  value: syntax error
  description: 2.4G sendBssTransferRequest() 不應因 shell syntax error 失敗
- field: result_24g
  operator: contains
  value: '[-1]'
  description: 2.4G sendBssTransferRequest() 應回傳 [-1]，表示 BTM frame 已送出。

verification_command: |
  # 5G pre-check
  wl -i wl0 assoclist
  ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.Capabilities?"
  # 2.4G pre-check
  wl -i wl2 assoclist
  ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.Capabilities?"

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC: Command return error'
  v4.0.3:
    5g: Pass
    6g: Blocker
    2.4g: Pass
    comment: '[-1] returned (BTM frame sent, STA did not ACK); 6G blocked by BCME_NOTREADY on wl1 join'
