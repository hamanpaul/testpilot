id: d490-getradiostats-wmm-failedbytessent-ac_be
name: D490 getRadioStats WmmFailedbytesSent AC_BE
source:
  row: 357
  object: WiFi.Radio.{i}.Stats.WmmFailedbytesSent.
  api: AC_BE
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_stats
  target: dut
  action: read
  capture: stats_5g
  command: ubus-cli "WiFi.Radio.1.getRadioStats()" | grep AC_BE_Stats
  expected: getRadioStats() 回傳有效值
  description: Radio.1 (5g) getRadioStats()
- id: step_6g_stats
  target: dut
  action: read
  capture: stats_6g
  command: ubus-cli "WiFi.Radio.2.getRadioStats()" | grep AC_BE_Stats
  expected: getRadioStats() 回傳有效值
  description: Radio.2 (6g) getRadioStats()
- id: step_24g_stats
  target: dut
  action: read
  capture: stats_24g
  command: ubus-cli "WiFi.Radio.3.getRadioStats()" | grep AC_BE_Stats
  expected: getRadioStats() 回傳有效值
  description: Radio.3 (2.4g) getRadioStats()
pass_criteria:
- field: stats_5g.WmmFailedbytesSent
  operator: regex
  value: ^\d+$
- field: stats_6g.WmmFailedbytesSent
  operator: regex
  value: ^\d+$
- field: stats_24g.WmmFailedbytesSent
  operator: regex
  value: ^\d+$
