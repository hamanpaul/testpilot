pass_criteria:
- field: after_set_5g.AfterSetGetterAmpdu5g
  operator: equals
  value: '1'
- field: after_set_5g.AfterSetDriverAmpdu5g
  operator: equals
  value: '1'
- field: after_set0_5g.AfterSet0GetterAmpdu5g
  operator: equals
  value: '0'
- field: after_set0_5g.AfterSet0DriverAmpdu5g
  operator: equals
  value: '0'
- field: after_restore_5g.AfterRestoreGetterAmpdu5g
  operator: equals
  value: '-1'
- field: after_set_6g.AfterSetGetterAmpdu6g
  operator: equals
  value: '1'
- field: after_set_6g.AfterSetBss6g
  operator: equals
  value: up
- field: after_set0_6g.AfterSet0GetterAmpdu6g
