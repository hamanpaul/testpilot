id: wifi-llapi-r311-accesspoint_associateddevice-uplinkratespec
name: UplinkRateSpec — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 311
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: UplinkRateSpec
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.UplinkRateSpec="leg_0_20_1_0"
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: Connect WiFi Station to GW
- id: step2
  action: exec
  target: DUT
  command: Check Associated Station UplinkRateSpec
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.AccessPoint.1.AssociatedDevice.*.UplinkRateSpec?

    ubus-cli WiFi.AccessPoint.1.AssociatedDevice.*.? | grep -E ''Band|SpatialStreams|Bandwidth|Guard'''
  depends_on: step2
  note: '#5G (11be, 4x4, 160MHz)###'
- id: step4
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.AccessPoint.3.AssociatedDevice.*.UplinkRateSpec?

    ubus-cli WiFi.AccessPoint.3.AssociatedDevice.*.? | grep -E ''Band|SpatialStreams|Bandwidth|Guard'''
  depends_on: step3
  note: '#6G (11be, 4x4, 320MHz)###'
- id: step5
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.AccessPoint.5.AssociatedDevice.*.UplinkRateSpec?

    ubus-cli WiFi.AccessPoint.5.AssociatedDevice.*.? | grep -E ''Band|SpatialStreams|Bandwidth|Guard'''
  capture: result
  depends_on: step4
  note: '#2.4G (11be, 2x2, 40MHz)###'
pass_criteria:
- field: result.UplinkRateSpec
  operator: contains
  value: leg_0_20_1_0
  description: UplinkRateSpec 應回傳包含 UplinkRateSpec=leg_0_20_1_0
