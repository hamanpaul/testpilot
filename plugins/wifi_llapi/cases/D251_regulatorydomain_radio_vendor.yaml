  expected: 6g wl country 應維持 #a (#a/0) <unknown>
  depends_on: step11_regdom_supported_6g
  description: Radio.2 (6g) 驗證 wl country 維持 workbook note 記載的 #a invariant。
- id: step13_regrev_restore_6g
  target: DUT
  action: exec
  band: 6g
  capture: restore_6g
  command:
  - printf 'RestoreRegRev6g=0\n'
