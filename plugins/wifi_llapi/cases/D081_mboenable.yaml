    if [ -n "$DRIVER" ]; then printf 'BaselineDriverMbo6g=%s\n' "$DRIVER"; else echo
    'BaselineDriverMbo6g=EMPTY'; fi
  capture: mbo_baseline_6g
- id: step7_mbo_enable_6g
  action: exec
  target: DUT
  band: 6g
  command:
  - printf 'RequestedEnableMbo6g=1\n'
  - ubus-cli WiFi.AccessPoint.3.MBOEnable=1
  depends_on: step6_mbo_baseline_6g
