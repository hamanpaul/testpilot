id: d403-getradiostats-temperature
name: D403 getRadioStats Temperature
source:
  row: 403
  object: WiFi.Radio.{i}.Stats.
  api: Temperature
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_stats
  target: dut
  action: read
  capture: stats_5g
  command: ubus-cli "WiFi.Radio.1.Stats.Temperature?"
  expected: Temperature 回傳有效值
  description: Radio.1 (5g) Temperature getter (Stats. 直接讀)
- id: step_6g_stats
  target: dut
  action: read
  capture: stats_6g
  command: ubus-cli "WiFi.Radio.2.Stats.Temperature?"
  expected: Temperature 回傳有效值
  description: Radio.2 (6g) Temperature getter (Stats. 直接讀)
- id: step_24g_stats
  target: dut
  action: read
  capture: stats_24g
  command: ubus-cli "WiFi.Radio.3.Stats.Temperature?"
  expected: Temperature 回傳有效值
  description: Radio.3 (2.4g) Temperature getter (Stats. 直接讀)
pass_criteria:
- field: stats_5g.Temperature
  operator: regex
  value: ^\d+$
- field: stats_6g.Temperature
  operator: regex
  value: ^\d+$
- field: stats_24g.Temperature
  operator: regex
  value: ^\d+$
