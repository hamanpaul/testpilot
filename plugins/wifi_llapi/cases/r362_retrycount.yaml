id: wifi-llapi-r362-ssid_stats-retrycount
name: RetryCount — WiFi.SSID.{i}.Stats.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 362
  object: WiFi.SSID.{i}.Stats.
  api: RetryCount
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.SSID.{i}.Stats.RetryCount=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: Connect WiFi Station to SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run traffic between Station
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: ubus-cli WiFi.SSID.*.Stats.RetryCount?
  capture: result
  depends_on: step2
  note: Verify SSID Retry Count
pass_criteria:
- field: result.RetryCount
  operator: contains
  value: '0'
  description: RetryCount 應回傳包含 RetryCount=0
verification_command: 'root@prplOS:/# wl -i wl0 sta_info 34:19:4d:a4:b5:09 | grep pkts

  tx total pkts: 101

  tx ucast pkts: 101

  tx mcast/bcast pkts: 0

  rx data pkts: 844

  rx ucast pkts: 334

  rx mcast/bcast pkts: 510

  tx data pkts retried: 0

  tx total pkts sent: 101

  tx pkts retries: 65

  tx pkts retry exhausted: 0

  rx total pkts retried: 78

  tx acked pkts: 101

  root@prplOS:/# wl -i wl1 sta_info 38:06:E6:92:B0:4A | grep pkts

  tx total pkts: 55010

  tx ucast pkts: 55010

  tx mcast/bcast pkts: 0

  rx data pkts: 69403

  rx ucast pkts: 66319

  rx '
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API always return "0" '
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: not support per ssid
