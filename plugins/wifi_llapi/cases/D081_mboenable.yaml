    | head -n 1); if [ -n "$VALUE" ]; then printf 'AfterRestoreGetterMbo5g=%s\n' "$VALUE";
    else echo 'AfterRestoreGetterMbo5g=EMPTY'; fi; RAW=$(wl -i wl0 mbo ap_enable 2>&1);
    DRIVER=$(printf '%s\n' "$RAW" | sed -n 's/^MBO AP ENABLE : \([0-9][0-9]*\).*/\1/p'
    | head -n 1); if [ -n "$DRIVER" ]; then printf 'AfterRestoreDriverMbo5g=%s\n'
    "$DRIVER"; else echo 'AfterRestoreDriverMbo5g=EMPTY'; fi
  depends_on: step4_mbo_restore_5g
  capture: mbo_after_restore_5g
- id: step6_mbo_baseline_6g
  action: exec
  target: DUT
  band: 6g
