id: d300-getssidstats-broadcastpacketsreceived
name: D300 getSSIDStats BroadcastPacketsReceived
source:
  row: 300
  object: WiFi.SSID.{i}.
  api: getSSIDStats()
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_stats
  target: dut
  action: read
  capture: stats_5g
  command: ubus-cli "WiFi.SSID.4.getSSIDStats()"
  expected: getSSIDStats() 回傳有效值
  description: SSID.4 (5g) getSSIDStats()
- id: step_6g_stats
  target: dut
  action: read
  capture: stats_6g
  command: ubus-cli "WiFi.SSID.6.getSSIDStats()"
  expected: getSSIDStats() 回傳有效值
  description: SSID.6 (6g) getSSIDStats()
- id: step_24g_stats
  target: dut
  action: read
  capture: stats_24g
  command: ubus-cli "WiFi.SSID.8.getSSIDStats()"
  expected: getSSIDStats() 回傳有效值
  description: SSID.8 (2.4g) getSSIDStats()
pass_criteria:
- field: stats_5g.BroadcastPacketsReceived
  operator: regex
  value: ^\d+$
- field: stats_6g.BroadcastPacketsReceived
  operator: regex
  value: ^\d+$
- field: stats_24g.BroadcastPacketsReceived
  operator: regex
  value: ^\d+$
