id: d267-getradiostats-discardpacketsreceived
name: D267 getRadioStats DiscardPacketsReceived
source:
  row: 267
  object: WiFi.Radio.{i}.
  api: getRadioStats()
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_stats
  target: dut
  action: read
  capture: stats_5g
  command: ubus-cli "WiFi.Radio.1.getRadioStats()"
  expected: getRadioStats() 回傳有效值
  description: Radio.1 (5g) getRadioStats()
- id: step_6g_stats
  target: dut
  action: read
  capture: stats_6g
  command: ubus-cli "WiFi.Radio.2.getRadioStats()"
  expected: getRadioStats() 回傳有效值
  description: Radio.2 (6g) getRadioStats()
- id: step_24g_stats
  target: dut
  action: read
  capture: stats_24g
  command: ubus-cli "WiFi.Radio.3.getRadioStats()"
  expected: getRadioStats() 回傳有效值
  description: Radio.3 (2.4g) getRadioStats()
pass_criteria:
- field: stats_5g.DiscardPacketsReceived
  operator: regex
  value: ^\d+$
- field: stats_6g.DiscardPacketsReceived
  operator: regex
  value: ^\d+$
- field: stats_24g.DiscardPacketsReceived
  operator: regex
  value: ^\d+$
