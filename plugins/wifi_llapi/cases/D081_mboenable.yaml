pass_criteria:
- field: mbo_baseline_5g.BaselineGetterMbo5g
  operator: equals
  value: '0'
  description: 5G AP1 / wl0 getter should start from the live baseline value 0.
- field: mbo_baseline_5g.BaselineDriverMbo5g
  operator: equals
  value: '0'
  description: 5G AP1 / wl0 direct driver readback should start from 0.
- field: mbo_baseline_5g.BaselineDriverMbo5g
  operator: equals
  reference: mbo_baseline_5g.BaselineGetterMbo5g
  description: 5G AP1 / wl0 direct driver readback should match the northbound 
    getter at baseline.
- field: mbo_enable_5g.RequestedEnableMbo5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 should request MBOEnable=1.
- field: mbo_after_enable_5g.AfterEnableGetterMbo5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 getter should follow the enable setter to 1.
- field: mbo_after_enable_5g.AfterEnableDriverMbo5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 direct driver readback should follow the enable 
    setter to 1.
- field: mbo_after_enable_5g.AfterEnableDriverMbo5g
