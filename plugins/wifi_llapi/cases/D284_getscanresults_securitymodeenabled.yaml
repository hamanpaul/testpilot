    1 ]; then MODE=WPA-Personal; elif [ "$HAS_RSN" -eq 1 ]; then MODE=WPA2-Enterprise;
    elif [ "$HAS_WPA" -eq 1 ]; then MODE=WPA-Enterprise; fi; [ -n "$AUTH" ] && printf
    "IwAuth24g=%s\n" "$AUTH"; printf "IwSecurityMode24g=%s\n" "$MODE"'
  expected: wl2 scan 需能對同一個 first-object target 回放 security mode
  description: wl2 scan 對位 2.4G first-object target 的 security mode
pass_criteria:
- field: llapi_5g.LlapiBssid5g
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
- field: llapi_5g.LlapiSecurityMode5g
  operator: regex
  value: .+
- field: iw_5g.IwSecurityMode5g
  operator: regex
  value: .+
- field: llapi_5g.LlapiSecurityMode5g
  operator: equals
  reference: iw_5g.IwSecurityMode5g
- field: llapi_6g.LlapiBssid6g
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
- field: llapi_6g.LlapiSecurityMode6g
