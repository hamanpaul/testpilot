id: d394-getradiostats-bytesreceived
name: D394 getRadioStats BytesReceived
source:
  row: 394
  object: WiFi.Radio.{i}.Stats.
  api: BytesReceived
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_stats
  target: dut
  action: read
  capture: stats_5g
  command: ubus-cli "WiFi.Radio.1.Stats.BytesReceived?"
  expected: BytesReceived 回傳有效值
  description: Radio.1 (5g) BytesReceived getter (Stats. 直接讀)
- id: step_6g_stats
  target: dut
  action: read
  capture: stats_6g
  command: ubus-cli "WiFi.Radio.2.Stats.BytesReceived?"
  expected: BytesReceived 回傳有效值
  description: Radio.2 (6g) BytesReceived getter (Stats. 直接讀)
- id: step_24g_stats
  target: dut
  action: read
  capture: stats_24g
  command: ubus-cli "WiFi.Radio.3.Stats.BytesReceived?"
  expected: BytesReceived 回傳有效值
  description: Radio.3 (2.4g) BytesReceived getter (Stats. 直接讀)
pass_criteria:
- field: stats_5g.BytesReceived
  operator: regex
  value: ^\d+$
- field: stats_6g.BytesReceived
  operator: regex
  value: ^\d+$
- field: stats_24g.BytesReceived
  operator: regex
  value: ^\d+$
