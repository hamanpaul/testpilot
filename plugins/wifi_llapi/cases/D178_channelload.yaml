id: d178-radio-channelload
name: D178 Radio ChannelLoad
source:
  row: 178
  object: WiFi.Radio.{i}.
  api: ChannelLoad
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_tight_capture
  target: dut
  action: exec
  capture: capture_5g
  command: AIR=$(ubus-cli "WiFi.Radio.1.getRadioAirStats()" 2>&1); printf '%s\n'
    "$AIR" | sed -n 's/^[[:space:]]*Load = \([0-9][0-9]*\).*/AirLoad5g=\1/p'; 
    ubus-cli "WiFi.Radio.1.ChannelLoad?" | sed -n 
    's/^WiFi\.Radio\.1\.ChannelLoad=\([0-9][0-9]*\)$/ChannelLoad5g=\1/p'; iw dev
    wl0 survey dump | awk '/\[in use\]/{inuse=1; next} inuse && /channel active 
    time:/ {line=$0; gsub(/[^0-9]/, "", line); active=line; next} inuse && 
    /channel busy time:/ {line=$0; gsub(/[^0-9]/, "", line); busy=line; if 
    ((active + 0) > 0) { printf 
    "SurveyActiveMs5g=%s\nSurveyBusyMs5g=%s\nSurveyChannelLoad5g=%d\n", active, 
    busy, int((busy * 100) / active); exit }}'
  expected: ChannelLoad 應與 getRadioAirStats.Load 及 survey dump derived load 對齊
  description: Radio.1 (5g) 先用 getRadioAirStats() refresh，再同窗抓 getter 與 survey 
    dump。
- id: step_6g_tight_capture
  target: dut
  action: exec
  capture: capture_6g
  command: AIR=$(ubus-cli "WiFi.Radio.2.getRadioAirStats()" 2>&1); printf '%s\n'
    "$AIR" | sed -n 's/^[[:space:]]*Load = \([0-9][0-9]*\).*/AirLoad6g=\1/p'; 
    ubus-cli "WiFi.Radio.2.ChannelLoad?" | sed -n 
    's/^WiFi\.Radio\.2\.ChannelLoad=\([0-9][0-9]*\)$/ChannelLoad6g=\1/p'; iw dev
    wl1 survey dump | awk '/\[in use\]/{inuse=1; next} inuse && /channel active 
    time:/ {line=$0; gsub(/[^0-9]/, "", line); active=line; next} inuse && 
    /channel busy time:/ {line=$0; gsub(/[^0-9]/, "", line); busy=line; if 
    ((active + 0) > 0) { printf 
    "SurveyActiveMs6g=%s\nSurveyBusyMs6g=%s\nSurveyChannelLoad6g=%d\n", active, 
    busy, int((busy * 100) / active); exit }}'
  expected: ChannelLoad 應與 getRadioAirStats.Load 及 survey dump derived load 對齊
  description: Radio.2 (6g) 先用 getRadioAirStats() refresh，再同窗抓 getter 與 survey 
    dump。
- id: step_24g_tight_capture
  target: dut
  action: exec
  capture: capture_24g
  command: AIR=$(ubus-cli "WiFi.Radio.3.getRadioAirStats()" 2>&1); printf '%s\n'
    "$AIR" | sed -n 's/^[[:space:]]*Load = \([0-9][0-9]*\).*/AirLoad24g=\1/p'; 
    ubus-cli "WiFi.Radio.3.ChannelLoad?" | sed -n 
    's/^WiFi\.Radio\.3\.ChannelLoad=\([0-9][0-9]*\)$/ChannelLoad24g=\1/p'; iw 
    dev wl2 survey dump | awk '/\[in use\]/{inuse=1; next} inuse && /channel 
    active time:/ {line=$0; gsub(/[^0-9]/, "", line); active=line; next} inuse 
    && /channel busy time:/ {line=$0; gsub(/[^0-9]/, "", line); busy=line; if 
    ((active + 0) > 0) { printf 
    "SurveyActiveMs24g=%s\nSurveyBusyMs24g=%s\nSurveyChannelLoad24g=%d\n", 
    active, busy, int((busy * 100) / active); exit }}'
  expected: ChannelLoad 應與 getRadioAirStats.Load 及 survey dump derived load 對齊
  description: Radio.3 (2.4g) 先用 getRadioAirStats() refresh，再同窗抓 getter 與 survey
    dump。
pass_criteria:
- field: capture_5g.AirLoad5g
  operator: regex
  value: ^\d+$
- field: capture_5g.ChannelLoad5g
  operator: equals
  reference: capture_5g.AirLoad5g
- field: capture_5g.SurveyChannelLoad5g
  operator: equals
  reference: capture_5g.ChannelLoad5g
- field: capture_6g.AirLoad6g
  operator: regex
  value: ^\d+$
- field: capture_6g.ChannelLoad6g
  operator: equals
  reference: capture_6g.AirLoad6g
- field: capture_6g.SurveyChannelLoad6g
  operator: equals
  reference: capture_6g.ChannelLoad6g
- field: capture_24g.AirLoad24g
  operator: regex
  value: ^\d+$
- field: capture_24g.ChannelLoad24g
  operator: equals
  reference: capture_24g.AirLoad24g
- field: capture_24g.SurveyChannelLoad24g
  operator: equals
  reference: capture_24g.ChannelLoad24g
