id: d395-getradiostats-bytessent
name: D395 getRadioStats BytesSent
source:
  row: 395
  object: WiFi.Radio.{i}.Stats.
  api: BytesSent
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_stats
  target: dut
  action: read
  capture: stats_5g
  command: ubus-cli "WiFi.Radio.1.Stats.BytesSent?"
  expected: BytesSent 回傳有效值
  description: Radio.1 (5g) BytesSent getter (Stats. 直接讀)
- id: step_6g_stats
  target: dut
  action: read
  capture: stats_6g
  command: ubus-cli "WiFi.Radio.2.Stats.BytesSent?"
  expected: BytesSent 回傳有效值
  description: Radio.2 (6g) BytesSent getter (Stats. 直接讀)
- id: step_24g_stats
  target: dut
  action: read
  capture: stats_24g
  command: ubus-cli "WiFi.Radio.3.Stats.BytesSent?"
  expected: BytesSent 回傳有效值
  description: Radio.3 (2.4g) BytesSent getter (Stats. 直接讀)
pass_criteria:
- field: stats_5g.BytesSent
  operator: regex
  value: ^\d+$
- field: stats_6g.BytesSent
  operator: regex
  value: ^\d+$
- field: stats_24g.BytesSent
  operator: regex
  value: ^\d+$
