id: d434-skip-neighbour-r0khkey
name: "D434 Neighbour R0KHKey"
version: '1.1'
source:
  row: 434
  object: WiFi.AccessPoint.{i}.Neighbour.{i}.
  api: R0KHKey
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.Neighbour.1.R0KHKey?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; Neighbour.R0KHKey is calibrated as an AP-only property workflow with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing Neighbour
  - live 2026-04-15 probe showed the top-level AP tree also exposes `IEEE80211r.R0KHKey="..."`, so the parser must stay scoped to `Neighbour.` lines only
  - `setNeighbourAP(BSSID=...,Channel=...)` accepted the workbook-style add on all three bands
  - the created neighbour entry read back `R0KHKey=""` on all three bands before delete
  - `delNeighbourAP(BSSID=...)` removed the same entry and returned the tree to the empty baseline on all three bands
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - capture the current `Neighbour` tree baseline on all three bands
  2) Per-band Neighbour probe:
     - add one neighbour entry with the workbook-style `BSSID` + `Channel` pair
     - re-read the `Neighbour` tree and confirm the entry appears with `R0KHKey=""`
     - delete the same neighbour entry by `BSSID`
     - re-read the `Neighbour` tree and confirm it returns to empty
  3) Verdict model:
     - this is a pass-path AP-only object lifecycle case
     - the case passes only when add and delete together produce `ABSENT -> "" -> ABSENT` on all three bands
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Capture the baseline `Neighbour` tree on AP1 / AP3 / AP5.
  2) Add one neighbour entry with `setNeighbourAP(BSSID=...,Channel=...)` on the same AP.
  3) Re-read the `Neighbour` tree and confirm the expected `BSSID` / `Channel` pair appears together with `R0KHKey=""`.
  4) Delete the same neighbour entry with `delNeighbourAP(BSSID=...)`.
  5) Re-read the `Neighbour` tree and confirm it returns to the empty baseline.
  Verdict: Pass. The current DUT accepts the workbook-style add and delete flow on all three bands, and the created neighbour entry exposes `R0KHKey=""` before delete returns the tree to empty.

steps:
- id: step1_neighbour_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    TREE=$(ubus-cli WiFi.AccessPoint.1.? | grep 'Neighbour.' || true); BSSID=$(printf
    '%s\n' "$TREE" | sed -n 's/.*Neighbour\.[0-9][0-9]*\.BSSID="\([^"]*\)".*/\1/p'
    | tail -n 1); CH=$(printf '%s\n' "$TREE" | sed -n 's/.*Neighbour\.[0-9][0-9]*\.Channel=\([0-9][0-9]*\).*/\1/p'
    | tail -n 1); R0KH=$(printf '%s\n' "$TREE" | sed -n 's/.*Neighbour\.[0-9][0-9]*\.R0KHKey="\([^"]*\)".*/\1/p'
    | tail -n 1); BC=$(printf '%s\n' "$TREE" | grep -c 'Neighbour\.[0-9][0-9]*\.BSSID=');
    CC=$(printf '%s\n' "$TREE" | grep -c 'Neighbour\.[0-9][0-9]*\.Channel='); RC=$(printf
    '%s\n' "$TREE" | grep -c 'Neighbour\.[0-9][0-9]*\.R0KHKey='); printf 'BaselineBssidCount5g=%s\n'
    "$BC"; printf 'BaselineChannelCount5g=%s\n' "$CC"; printf 'BaselineR0KHKeyCount5g=%s\n'
    "$RC"; if [ -n "$BSSID" ]; then printf 'BaselineBssid5g=%s\n' "$BSSID"; else echo
    'BaselineBssid5g=ABSENT'; fi; if [ -n "$CH" ]; then printf 'BaselineChannel5g=%s\n'
    "$CH"; else echo 'BaselineChannel5g=ABSENT'; fi; if [ "$RC" -gt 0 ]; then printf
    'BaselineR0KHKey5g="%s"\n' "$R0KH"; else echo 'BaselineR0KHKey5g=ABSENT'; fi
  capture: neighbour_baseline_5g
- id: step2_neighbour_add_5g
  action: exec
  target: DUT
  band: 5g
  command:
  - printf 'RequestedBssid5g=11:22:33:44:55:66\n'
  - printf 'RequestedChannel5g=36\n'
  - ubus-cli 
    "WiFi.AccessPoint.1.setNeighbourAP(BSSID=11:22:33:44:55:66,Channel=36)"
  depends_on: step1_neighbour_baseline_5g
  capture: neighbour_add_5g
- id: step3_neighbour_after_add_5g
  action: exec
