id: wifi-llapi-D070-enable-accesspoint
name: "Enable — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 70
  object: WiFi.AccessPoint.{i}.
  api: Enable
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.1.Enable=1'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; Enable is validated as an AP-only baseline case)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - force AP1, AP3, and AP5 back to Enable=1 on the documented baseline
  - cross-check the northbound Enable getter against driver `wl -i wlX bss`
  - workbook row 70 treats this as a tri-band baseline pass when all three APs stay enabled
setup_steps: |
  1) DUT baseline:
     - force AP1 / AP3 / AP5 to Enable=1 before sampling
     - confirm wl0 / wl1 / wl2 BSS instances stay reachable on the documented non-open baseline
  2) Per-band getter:
     - read Enable on AP1 / AP3 / AP5
     - cross-check the same band's driver `wl -i wlX bss` state
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Force AP1 / AP3 / AP5 back to Enable=1 on the validated tri-band baseline.
  2) Read WiFi.AccessPoint.1/3/5.Enable directly on DUT.
  3) Cross-check driver wl0 / wl1 / wl2 bss state for the same three APs.
  4) Pass when all three bands keep Enable=1 and driver bss=up, matching workbook row 70.
steps:
- id: step1_enable_5g
  action: exec
  target: DUT
  band: 5g
  command:
    - 'echo "Enable5g=$(ubus-cli ''WiFi.AccessPoint.1.Enable?'' 2>/dev/null | grep -o ''Enable=[0-9]*'' | cut -d= -f2)"'
    - 'echo "DriverBss5g=$(wl -i wl0 bss 2>/dev/null)"'
  capture: enable_5g
- id: step2_enable_6g
  action: exec
  target: DUT
  band: 6g
  depends_on: step1_enable_5g
  command:
    - 'echo "Enable6g=$(ubus-cli ''WiFi.AccessPoint.3.Enable?'' 2>/dev/null | grep -o ''Enable=[0-9]*'' | cut -d= -f2)"'
    - 'echo "DriverBss6g=$(wl -i wl1 bss 2>/dev/null)"'
  capture: enable_6g
- id: step3_enable_24g
  action: exec
  target: DUT
  band: 2.4g
  depends_on: step2_enable_6g
  command:
    - 'echo "Enable24g=$(ubus-cli ''WiFi.AccessPoint.5.Enable?'' 2>/dev/null | grep -o ''Enable=[0-9]*'' | cut -d= -f2)"'
    - 'echo "DriverBss24g=$(wl -i wl2 bss 2>/dev/null)"'
  capture: enable_24g
pass_criteria:
- field: enable_5g.Enable5g
  operator: equals
  value: '1'
  description: 5G AP1 should stay enabled on the workbook row 70 baseline.
- field: enable_5g.DriverBss5g
  operator: equals
  value: up
  description: 5G wl0 driver bss state should stay up while Enable=1.
- field: enable_6g.Enable6g
  operator: equals
  value: '1'
  description: 6G AP3 should stay enabled on the workbook row 70 baseline.
- field: enable_6g.DriverBss6g
  operator: equals
  value: up
  description: 6G wl1 driver bss state should stay up while Enable=1.
- field: enable_24g.Enable24g
  operator: equals
  value: '1'
  description: 2.4G AP5 should stay enabled on the workbook row 70 baseline.
- field: enable_24g.DriverBss24g
  operator: equals
  value: up
  description: 2.4G wl2 driver bss state should stay up while Enable=1.
verification_command:
  - 'echo "Enable5g=$(ubus-cli ''WiFi.AccessPoint.1.Enable?'' 2>/dev/null | grep -o ''Enable=[0-9]*'' | cut -d= -f2)"'
  - 'echo "DriverBss5g=$(wl -i wl0 bss 2>/dev/null)"'
  - 'echo "Enable6g=$(ubus-cli ''WiFi.AccessPoint.3.Enable?'' 2>/dev/null | grep -o ''Enable=[0-9]*'' | cut -d= -f2)"'
  - 'echo "DriverBss6g=$(wl -i wl1 bss 2>/dev/null)"'
  - 'echo "Enable24g=$(ubus-cli ''WiFi.AccessPoint.5.Enable?'' 2>/dev/null | grep -o ''Enable=[0-9]*'' | cut -d= -f2)"'
  - 'echo "DriverBss24g=$(wl -i wl2 bss 2>/dev/null)"'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: >-
      Workbook row 70 and confirmation reruns both show AP1/AP3/AP5 return
      `Enable=1` while direct driver `wl -i wl{0,1,2} bss` stays `up` on the
      validated baseline.
