id: d505-ssid-wmm-ac_bk_stats_wmmfailedbytesreceived_ssid
name: D505 WmmFailedBytesReceived.AC_BK
source:
  row: 505
  object: WiFi.SSID.{i}.Stats.WmmFailedBytesReceived.
  api: AC_BK
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_refresh
  target: dut
  action: exec
  capture: refresh_5g
  command: ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n '/WmmFailedBytesReceived = {/,/}/s/^[[:space:]]*AC_BK = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedBytesReceived5g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedBytesReceived.AC_BK
  description: SSID.4 (5g) getSSIDStats() WmmFailedBytesReceived.AC_BK refresh
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.SSID.4.Stats.WmmFailedBytesReceived.AC_BK?"'
  expected: Stats.WmmFailedBytesReceived.AC_BK getter 回傳有效值
  description: SSID.4 (5g) direct Stats.WmmFailedBytesReceived.AC_BK
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 wme_counters | grep -A2 '^AC_BK:' | awk '/rx frames:/ {print "DriverWmmFailedBytesReceived5g="$11}'
  expected: wl0 wme_counters 匯出 AC_BK rx failed bytes
  description: SSID.4 (5g) driver AC_BK rx failed bytes
- id: step_6g_refresh
  target: dut
  action: exec
  capture: refresh_6g
  command: ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n '/WmmFailedBytesReceived = {/,/}/s/^[[:space:]]*AC_BK = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedBytesReceived6g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedBytesReceived.AC_BK
  description: SSID.6 (6g) getSSIDStats() WmmFailedBytesReceived.AC_BK refresh
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.SSID.6.Stats.WmmFailedBytesReceived.AC_BK?"'
  expected: Stats.WmmFailedBytesReceived.AC_BK getter 回傳有效值
  description: SSID.6 (6g) direct Stats.WmmFailedBytesReceived.AC_BK
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 wme_counters | grep -A2 '^AC_BK:' | awk '/rx frames:/ {print "DriverWmmFailedBytesReceived6g="$11}'
  expected: wl1 wme_counters 匯出 AC_BK rx failed bytes
  description: SSID.6 (6g) driver AC_BK rx failed bytes
- id: step_24g_refresh
  target: dut
  action: exec
  capture: refresh_24g
  command: ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n '/WmmFailedBytesReceived = {/,/}/s/^[[:space:]]*AC_BK = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedBytesReceived24g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedBytesReceived.AC_BK
  description: SSID.8 (2.4g) getSSIDStats() WmmFailedBytesReceived.AC_BK refresh
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.SSID.8.Stats.WmmFailedBytesReceived.AC_BK?"'
  expected: Stats.WmmFailedBytesReceived.AC_BK getter 回傳有效值
  description: SSID.8 (2.4g) direct Stats.WmmFailedBytesReceived.AC_BK
- id: step_24g_driver
  target: dut
