    CC=$(printf '%s\n' "$TREE" | grep -c 'Neighbour\.[0-9][0-9]*\.Channel='); RC=$(printf
    '%s\n' "$TREE" | grep -c 'Neighbour\.[0-9][0-9]*\.R0KHKey='); printf 'AfterAddBssidCount5g=%s\n'
    "$BC"; printf 'AfterAddChannelCount5g=%s\n' "$CC"; printf 'AfterAddR0KHKeyCount5g=%s\n'
    "$RC"; if [ -n "$BSSID" ]; then printf 'AfterAddBssid5g=%s\n' "$BSSID"; else echo
    'AfterAddBssid5g=ABSENT'; fi; if [ -n "$CH" ]; then printf 'AfterAddChannel5g=%s\n'
    "$CH"; else echo 'AfterAddChannel5g=ABSENT'; fi; if [ "$RC" -gt 0 ]; then printf
    'AfterAddR0KHKey5g="%s"\n' "$R0KH"; else echo 'AfterAddR0KHKey5g=ABSENT'; fi
  depends_on: step2_neighbour_add_5g
  capture: neighbour_after_add_5g
- id: step4_neighbour_delete_5g
