  command: ubus-cli "WiFi.Radio.2.getSpectrumInfo()"
  expected: accesspoints 出現在回傳 array 中
  description: Radio.2 (6g) getSpectrumInfo → accesspoints
- id: step_24g_method
  target: dut
  action: read
  capture: method_24g
  command: ubus-cli "WiFi.Radio.3.getSpectrumInfo()"
  expected: accesspoints 出現在回傳 array 中
  description: Radio.3 (2.4g) getSpectrumInfo → accesspoints
pass_criteria:
- field: method_5g.accesspoints
  operator: regex
  value: ^\d+$
- field: method_6g.accesspoints
  operator: regex
  value: ^\d+$
- field: method_24g.accesspoints
  operator: regex
