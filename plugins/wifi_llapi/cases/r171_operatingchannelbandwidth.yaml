id: wifi-llapi-r171-radio-operatingchannelbandwidth
name: OperatingChannelBandwidth — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 171
  object: WiFi.Radio.{i}.
  api: OperatingChannelBandwidth
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.OperatingChannelBandwidth=160MHz
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.MaxChannelBandwidth?
  note: 'Check MaxChannelBandwidth for each radio:'
- id: step2
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.Radio.1.OperatingChannelBandwidth=[20|40|80|160]MHz

    ubus-cli WiFi.Radio.2.OperatingChannelBandwidth=[20|40|80|160|320-1|320-2]MHz

    ubus-cli WiFi.Radio.3.OperatingChannelBandwidth=[20|40]MHz'
  depends_on: step1
  note: Set every valid bandwidths for every radio individually.
- id: step3
  action: exec
  target: DUT
  command: For every valid bandwidth, compare with driver returns value and air beacon packets status.
  capture: result
  depends_on: step2
pass_criteria:
- field: result.OperatingChannelBandwidth
  operator: contains
  value: 160MHz
  description: OperatingChannelBandwidth 應回傳包含 OperatingChannelBandwidth=160MHz
verification_command: 'wl -i wl[x] status


  wl -i wl0 status

  ...

  Chanspec: 5GHz channel [ch] 20MHz 40MHz 80MHz 160MHz


  wl -i wl1 status

  ...

  Chanspec: 6GHz channel [ch] 20MHz 40MHz 80MHz 160MHz 320MHz


  wl -i wl2 status

  ...

  Chanspec: 2.4GHz channel [ch] 20MHz 40MHz


  -

  wl -i wl[x] chanspecs


  root@prplOS:/# wl -i wl0 chanspecs

  36 (0xd024)

  40 (0xd028)

