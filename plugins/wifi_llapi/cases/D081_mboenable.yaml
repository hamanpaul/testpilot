id: wifi-llapi-D081-mboenable
name: "MBOEnable — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  row: 81
  object: WiFi.AccessPoint.{i}.
  api: MBOEnable
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.1.MBOEnable=0
llapi_support: Support
implemented_by: Vendor Module
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; MBOEnable is calibrated as an AP-only setter/getter case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing MBOEnable
  - restore `WiFi.AccessPoint.{1,3,5}.MBOEnable=0` before the probe so the starting state is not polluted by previous cases
  - active 0403 source maps both the northbound setter and getter to `wl -i <if> mbo ap_enable`
  - workbook row 81 is therefore calibrated against `ubus-cli ... MBOEnable?` plus direct `wl ... mbo ap_enable` driver readback, not hostapd `mbo=`
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - restore `WiFi.AccessPoint.{1,3,5}.MBOEnable=0` before capturing the baseline
     - capture the current getter and direct `wl -i wlX mbo ap_enable` baseline on all three bands
  2) Per-band MBOEnable probe:
     - set `MBOEnable=1` on the same AP
     - allow the wl FSM to settle, then re-read both getter and direct driver state
     - restore the same AP back to `0`
     - allow the wl FSM to settle, then re-read both getter and direct driver state
  3) Verdict model:
     - this is a pass-shaped workbook row
     - the case passes only when the northbound getter and direct driver readback exact-close `0 -> 1 -> 0` on all three bands
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    ubus-cli WiFi.AccessPoint.1.MBOEnable=0
    ubus-cli WiFi.AccessPoint.3.MBOEnable=0
    ubus-cli WiFi.AccessPoint.5.MBOEnable=0
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Force AP1 / AP3 / AP5 `MBOEnable=0`, then capture baseline getter + direct `wl ... mbo ap_enable` state.
  2) Set `MBOEnable=1` on the same AP and re-read both getter and driver state after settle.
  3) Restore `MBOEnable=0` and re-read both getter and driver state again after settle.
  4) Confirm getter and direct driver readback exact-close `0 -> 1 -> 0` on AP1 / AP3 / AP5.
  Verdict: Pass. Active 0403 `wifi_ap.c` maps both `handle_set_ap_mbo_enable()` and `handle_get_ap_mbo_enable()` to `wl -i <if> mbo ap_enable`, so workbook row 81 is live-aligned when ubus and direct driver state converge on all three bands.

steps:
- id: step1_mbo_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.MBOEnable?" 2>&1); VALUE=$(printf '%s\n' "$OUT"
    | sed -n 's/^WiFi\.AccessPoint\.1\.MBOEnable=\([0-9][0-9]*\).*/\1/p' | head -n
    1); if [ -n "$VALUE" ]; then printf 'BaselineGetterMbo5g=%s\n' "$VALUE"; else
    echo 'BaselineGetterMbo5g=EMPTY'; fi; RAW=$(wl -i wl0 mbo ap_enable 2>&1); DRIVER=$(printf
    '%s\n' "$RAW" | sed -n 's/^MBO AP ENABLE : \([0-9][0-9]*\).*/\1/p' | head -n 1);
    if [ -n "$DRIVER" ]; then printf 'BaselineDriverMbo5g=%s\n' "$DRIVER"; else echo
    'BaselineDriverMbo5g=EMPTY'; fi
  capture: mbo_baseline_5g
- id: step2_mbo_enable_5g
  action: exec
  target: DUT
  band: 5g
  command:
  - printf 'RequestedEnableMbo5g=1\n'
  - ubus-cli WiFi.AccessPoint.1.MBOEnable=1
  depends_on: step1_mbo_baseline_5g
  capture: mbo_enable_5g
- id: step3_mbo_after_enable_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    sleep 5; OUT=$(ubus-cli "WiFi.AccessPoint.1.MBOEnable?" 2>&1); VALUE=$(printf
    '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MBOEnable=\([0-9][0-9]*\).*/\1/p'
    | head -n 1); if [ -n "$VALUE" ]; then printf 'AfterEnableGetterMbo5g=%s\n' "$VALUE";
    else echo 'AfterEnableGetterMbo5g=EMPTY'; fi; RAW=$(wl -i wl0 mbo ap_enable 2>&1);
    DRIVER=$(printf '%s\n' "$RAW" | sed -n 's/^MBO AP ENABLE : \([0-9][0-9]*\).*/\1/p'
    | head -n 1); if [ -n "$DRIVER" ]; then printf 'AfterEnableDriverMbo5g=%s\n' "$DRIVER";
    else echo 'AfterEnableDriverMbo5g=EMPTY'; fi
  depends_on: step2_mbo_enable_5g
  capture: mbo_after_enable_5g
- id: step4_mbo_restore_5g
  action: exec
  target: DUT
  band: 5g
  command:
  - printf 'RestoreMbo5g=0\n'
  - ubus-cli WiFi.AccessPoint.1.MBOEnable=0
  depends_on: step3_mbo_after_enable_5g
  capture: mbo_restore_5g
- id: step5_mbo_after_restore_5g
