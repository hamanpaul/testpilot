- field: combined_24g.CombinedBssid24g
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 2.4G 必須先鎖定 same-scan 第一個 target BSSID
- field: combined_24g.CombinedNoise24g
  operator: regex
  value: ^-?[0-9][0-9]*$
  description: 2.4G combined BSS Noise 必須成功擷取
- field: combined_24g.SpectrumNoise24g
  operator: regex
  value: ^-?[0-9][0-9]*$
  description: 2.4G paired Spectrum noise 必須成功擷取
- field: scan_24g.LlapiNoise24g
