    else echo 'AfterRestoreGetterMbo6g=EMPTY'; fi; RAW=$(wl -i wl1 mbo ap_enable 2>&1);
    DRIVER=$(printf '%s\n' "$RAW" | sed -n 's/^MBO AP ENABLE : \([0-9][0-9]*\).*/\1/p'
    | head -n 1); if [ -n "$DRIVER" ]; then printf 'AfterRestoreDriverMbo6g=%s\n'
    "$DRIVER"; else echo 'AfterRestoreDriverMbo6g=EMPTY'; fi
  depends_on: step9_mbo_restore_6g
  capture: mbo_after_restore_6g
