id: d285-getscanresults-signalnoiseratio
name: D285 getScanResults SignalNoiseRatio
source:
  row: 285
  object: WiFi.Radio.{i}.
  api: getScanResults()
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_scan
  target: dut
  action: exec
  capture: scan_5g
  command: 'BLOCK=$(ubus-cli "WiFi.Radio.1.getScanResults()" | head -60 | sed -n "/BSSID
    = /,/^        },/p"); BSSID=$(printf "%s\n" "$BLOCK" | sed -n "s/.*BSSID = \"\([^\"]*\)\".*/\1/p"
    | head -n1); RSSI=$(printf "%s\n" "$BLOCK" | sed -n "s/.*RSSI = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); NOISE=$(printf "%s\n" "$BLOCK" | sed -n "s/.*Noise = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); SNR=$(printf "%s\n" "$BLOCK" | sed -n "s/.*SignalNoiseRatio = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); LBSSID=$(printf "%s" "$BSSID" | tr "A-F" "a-f"); [ -n "$RSSI" ] &&
    [ -n "$NOISE" ] && DERIVED=$((RSSI - NOISE)); printf "LlapiBssid5g=%s\nLlapiRSSI5g=%s\nLlapiNoise5g=%s\nLlapiSignalNoiseRatio5g=%s\nDerivedSignalNoiseRatio5g=%s\n"
    "$LBSSID" "$RSSI" "$NOISE" "$SNR" "$DERIVED"'
  expected: 5G 第一個 scan object 應提供可解析 BSSID，且 public SignalNoiseRatio 必須等於 
    RSSI-Noise
  description: Radio.1 (5g) 以 first-object capture 驗證 public SignalNoiseRatio 與 
    RSSI/Noise 同源
- id: step_6g_scan
  target: dut
  action: exec
  capture: scan_6g
  command: 'BLOCK=$(ubus-cli "WiFi.Radio.2.getScanResults()" | head -60 | sed -n "/BSSID
    = /,/^        },/p"); BSSID=$(printf "%s\n" "$BLOCK" | sed -n "s/.*BSSID = \"\([^\"]*\)\".*/\1/p"
    | head -n1); RSSI=$(printf "%s\n" "$BLOCK" | sed -n "s/.*RSSI = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); NOISE=$(printf "%s\n" "$BLOCK" | sed -n "s/.*Noise = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); SNR=$(printf "%s\n" "$BLOCK" | sed -n "s/.*SignalNoiseRatio = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); LBSSID=$(printf "%s" "$BSSID" | tr "A-F" "a-f"); [ -n "$RSSI" ] &&
    [ -n "$NOISE" ] && DERIVED=$((RSSI - NOISE)); printf "LlapiBssid6g=%s\nLlapiRSSI6g=%s\nLlapiNoise6g=%s\nLlapiSignalNoiseRatio6g=%s\nDerivedSignalNoiseRatio6g=%s\n"
    "$LBSSID" "$RSSI" "$NOISE" "$SNR" "$DERIVED"'
  expected: 6G 第一個 scan object 應提供可解析 BSSID，且 public SignalNoiseRatio 必須等於 
    RSSI-Noise
  description: Radio.2 (6g) 以 first-object capture 驗證 public SignalNoiseRatio 與 
    RSSI/Noise 同源
- id: step_24g_scan
  target: dut
  action: exec
  capture: scan_24g
  command: 'BLOCK=$(ubus-cli "WiFi.Radio.3.getScanResults()" | head -60 | sed -n "/BSSID
    = /,/^        },/p"); BSSID=$(printf "%s\n" "$BLOCK" | sed -n "s/.*BSSID = \"\([^\"]*\)\".*/\1/p"
    | head -n1); RSSI=$(printf "%s\n" "$BLOCK" | sed -n "s/.*RSSI = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); NOISE=$(printf "%s\n" "$BLOCK" | sed -n "s/.*Noise = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); SNR=$(printf "%s\n" "$BLOCK" | sed -n "s/.*SignalNoiseRatio = \(-\?[0-9][0-9]*\).*/\1/p"
    | head -n1); LBSSID=$(printf "%s" "$BSSID" | tr "A-F" "a-f"); [ -n "$RSSI" ] &&
    [ -n "$NOISE" ] && DERIVED=$((RSSI - NOISE)); printf "LlapiBssid24g=%s\nLlapiRSSI24g=%s\nLlapiNoise24g=%s\nLlapiSignalNoiseRatio24g=%s\nDerivedSignalNoiseRatio24g=%s\n"
    "$LBSSID" "$RSSI" "$NOISE" "$SNR" "$DERIVED"'
  expected: 2.4G 第一個 scan object 應提供可解析 BSSID，且 public SignalNoiseRatio 必須等於 
    RSSI-Noise
  description: Radio.3 (2.4g) 以 first-object capture 驗證 public SignalNoiseRatio 
    與 RSSI/Noise 同源
pass_criteria:
- field: scan_5g.LlapiBssid5g
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 5G 必須先鎖定第一個 scan target BSSID
- field: scan_5g.LlapiRSSI5g
  operator: regex
  value: ^-?[0-9][0-9]*$
  description: 5G RSSI 必須成功擷取
- field: scan_5g.LlapiNoise5g
  operator: regex
  value: ^-?[0-9][0-9]*$
  description: 5G Noise 必須成功擷取
- field: scan_5g.LlapiSignalNoiseRatio5g
  operator: equals
  reference: scan_5g.DerivedSignalNoiseRatio5g
  description: 5G public SignalNoiseRatio 必須等於同一 scan object 的 RSSI-Noise
- field: scan_6g.LlapiBssid6g
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 6G 必須先鎖定第一個 scan target BSSID
- field: scan_6g.LlapiRSSI6g
  operator: regex
  value: ^-?[0-9][0-9]*$
  description: 6G RSSI 必須成功擷取
- field: scan_6g.LlapiNoise6g
  operator: regex
  value: ^-?[0-9][0-9]*$
  description: 6G Noise 必須成功擷取
- field: scan_6g.LlapiSignalNoiseRatio6g
  operator: equals
  reference: scan_6g.DerivedSignalNoiseRatio6g
  description: 6G public SignalNoiseRatio 必須等於同一 scan object 的 RSSI-Noise
- field: scan_24g.LlapiBssid24g
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 2.4G 必須先鎖定第一個 scan target BSSID
- field: scan_24g.LlapiRSSI24g
  operator: regex
  value: ^-?[0-9][0-9]*$
  description: 2.4G RSSI 必須成功擷取
- field: scan_24g.LlapiNoise24g
  operator: regex
  value: ^-?[0-9][0-9]*$
  description: 2.4G Noise 必須成功擷取
- field: scan_24g.LlapiSignalNoiseRatio24g
  operator: equals
  reference: scan_24g.DerivedSignalNoiseRatio24g
  description: 2.4G public SignalNoiseRatio 必須等於同一 scan object 的 RSSI-Noise
