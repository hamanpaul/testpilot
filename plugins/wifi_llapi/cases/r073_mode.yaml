id: wifi-llapi-r073-accesspoint_macfiltering_mode-mode
name: Mode — WiFi.AccessPoint.{i}.MACFiltering.Mode
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 73
  object: WiFi.AccessPoint.{i}.MACFiltering.Mode
  api: Mode
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.MACFiltering.Mode=Off
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.AccessPoint.? | grep .MACFiltering.Mode=

    ubus-cli WiFi.AccessPoint.1.MACFiltering.Mode="Off"

    ubus-cli WiFi.AccessPoint.3.MACFiltering.Mode="Off"'
  capture: result
  note: root@prplOS:/# ubus-cli WiFi.AccessPoint.? | grep .MACFiltering.Mode=
pass_criteria:
- field: result.Mode
  operator: contains
  value: 'Off'
  description: Mode 應回傳包含 Mode=Off
verification_command: 'cat /tmp/wl0_hapd.conf

  accept_mac_file=/tmp/hostap_wl0.acl

  or

  deny_mac_file=/tmp/hostap_wl0.acl


  root@prplOS:/# cat /tmp/wl0_hapd.conf | grep acl

  macaddr_acl=1

  accept_mac_file=/tmp/hostap_wl0.acl

  root@prplOS:/# cat /tmp/wl2_hapd.conf | grep acl

  macaddr_acl=0

  deny_mac_file=/tmp/hostap_wl2.acl

  root@prplOS:/# cat /tmp/wl1_hapd.conf | grep acl

  macaddr_acl=0

  deny_mac_file=/tmp/hostap_wl1.acl'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : Cannot switch Off'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: can set with ubus-cli WiFi.AccessPoint.2.MACFiltering.Mode=\"Off\"
