id: d204-radio-multiusermimoenabled
name: D204 Radio MultiUserMIMOEnabled
source:
  row: 167
  object: WiFi.Radio.{i}.
  api: MultiUserMIMOEnabled
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.MultiUserMIMOEnabled?"
  expected: MultiUserMIMOEnabled 回傳有效值
  description: Radio.1 (5g) MultiUserMIMOEnabled getter（live=1）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.MultiUserMIMOEnabled?"
  expected: MultiUserMIMOEnabled 回傳有效值
  description: Radio.2 (6g) MultiUserMIMOEnabled getter（live=1）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.MultiUserMIMOEnabled?"
  expected: MultiUserMIMOEnabled 回傳有效值
  description: Radio.3 (2.4g) MultiUserMIMOEnabled getter（live=0）
pass_criteria:
- field: getter_5g.MultiUserMIMOEnabled
  operator: regex
  value: "^[01]$"
- field: getter_6g.MultiUserMIMOEnabled
  operator: regex
  value: "^[01]$"
- field: getter_24g.MultiUserMIMOEnabled
  operator: regex
  value: "^[01]$"
