    echo 'AfterMode5g=EMPTY'; fi; CFG=$(grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)='
    /tmp/wl0_hapd.conf 2>/dev/null || true); ACL=$(printf '%s\n' "$CFG" | sed -n 's/^[0-9][0-9]*:macaddr_acl=\(.*\)$/\1/p'
    | head -n 1); if [ -n "$ACL" ]; then printf 'AfterMacaddrAcl5g=%s\n' "$ACL"; else
    echo 'AfterMacaddrAcl5g=ABSENT'; fi; if printf '%s\n' "$CFG" | grep -q 'accept_mac_file=';
    then echo 'AfterAclState5g=accept'; elif printf '%s\n' "$CFG" | grep -q 'deny_mac_file=';
    then echo 'AfterAclState5g=deny'; else echo 'AfterAclState5g=absent'; fi
  depends_on: step2_set_off_5g
  capture: mode_after_set_5g
