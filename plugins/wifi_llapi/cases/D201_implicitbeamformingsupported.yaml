id: d201-radio-implicitbeamformingsupported
name: D201 Radio ImplicitBeamFormingSupported
source:
  row: 201
  object: WiFi.Radio.{i}.
  api: ImplicitBeamFormingSupported
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.ImplicitBeamFormingSupported?"
  expected: ImplicitBeamFormingSupported 回傳有效值
  description: Radio.1 (5g) ImplicitBeamFormingSupported getter（live=1）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.ImplicitBeamFormingSupported?"
  expected: ImplicitBeamFormingSupported 回傳有效值
  description: Radio.2 (6g) ImplicitBeamFormingSupported getter（live=1）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.ImplicitBeamFormingSupported?"
  expected: ImplicitBeamFormingSupported 回傳有效值
  description: Radio.3 (2.4g) ImplicitBeamFormingSupported getter（live=1）
pass_criteria:
- field: getter_5g.ImplicitBeamFormingSupported
  operator: regex
  value: "^[01]$"
- field: getter_6g.ImplicitBeamFormingSupported
  operator: regex
  value: "^[01]$"
- field: getter_24g.ImplicitBeamFormingSupported
  operator: regex
  value: "^[01]$"
