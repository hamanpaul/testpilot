id: d319-bssid-ssid
name: D319 BSSID SSID
source:
  row: 242
  object: WiFi.SSID.{i}.
  api: BSSID
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Live probe confirmed SSID.4/6/8 all return valid MAC BSSIDs matching iw dev info
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g
  target: dut
  action: read
  capture: bssid_5g
  command: ubus-cli "WiFi.SSID.4.BSSID?"
  expected: 回傳有效 MAC 位址
  description: SSID.4 (5g) BSSID
- id: step_6g
  target: dut
  action: read
  capture: bssid_6g
  command: ubus-cli "WiFi.SSID.6.BSSID?"
  expected: 回傳有效 MAC 位址
  description: SSID.6 (6g) BSSID
- id: step_24g
  target: dut
  action: read
  capture: bssid_24g
  command: ubus-cli "WiFi.SSID.8.BSSID?"
  expected: 回傳有效 MAC 位址
  description: SSID.8 (2.4g) BSSID
pass_criteria:
- field: bssid_5g.BSSID
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
- field: bssid_6g.BSSID
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
- field: bssid_24g.BSSID
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
