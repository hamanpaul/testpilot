id: wifi-llapi-r183-radio_vendor-regulatorydomain
name: RegulatoryDomain — WiFi.Radio.{i}.Vendor.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 183
  object: WiFi.Radio.{i}.Vendor.
  api: RegulatoryDomain
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Vendor.Brcm.RegulatoryDomainRev=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainRev?
  note: 'Get API default value:'
- id: step2
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainRev=8
  depends_on: step1
  note: 'Change the parameter to any other value:'
- id: step3
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainSupported?
  depends_on: step2
  note: 'Check supported RegulatoryDomainSupported:'
- id: step4
  action: exec
  target: DUT
  command: Check if "wl -i wl* country" gets representing rev value(in my case, expecting wl0=GB/36, wl1= JP/89, wl2=GB/36)
  capture: result
  depends_on: step3
pass_criteria:
- field: result.RegulatoryDomainRev
  operator: contains
  value: '0'
  description: RegulatoryDomain 應回傳包含 RegulatoryDomainRev=0
verification_command: 'wl -i wl0 country

  wl -i wl1 country

  wl -i wl2 country


  root@prplOS:/# wl -i wl0 country

  #a (#a/0) <unknown>

  root@prplOS:/# wl -i wl1 country

  #a (#a/0) <unknown>

  root@prplOS:/# wl -i wl2 country

  #a (#a/0) <unknown>'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: "supported; \nwl -i wl0 country list\nwl -i wl0 contry_rev xx\nubus-cli WiFi.Radio.1.RegulatoryDomain=CA; ubus-cli\
      \ WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=170"
