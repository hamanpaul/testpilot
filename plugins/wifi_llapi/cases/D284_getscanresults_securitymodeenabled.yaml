    "\([^"]*\)".*/\1/p'' | head -n1); [ -n "$BSSID" ] && printf "LlapiBssid6g=%s\n"
    "$(printf "%s" "$BSSID" | tr "A-F" "a-f")"; [ -n "$SEC" ] && printf "LlapiSecurityMode6g=%s\n"
    "$SEC"'
  expected: 6G 第一個 serialized scan object 需提供 BSSID 與 SecurityModeEnabled
  description: Radio.2 (6g) 以 first-object capture 驗證 SecurityModeEnabled
