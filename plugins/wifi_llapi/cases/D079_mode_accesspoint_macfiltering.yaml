    | head -n 1); if [ -n "$ACL" ]; then printf 'BaselineMacaddrAcl6g=%s\n' "$ACL";
    else echo 'BaselineMacaddrAcl6g=ABSENT'; fi; if printf '%s\n' "$CFG" | grep -q
