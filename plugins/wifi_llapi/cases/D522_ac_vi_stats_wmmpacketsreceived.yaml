id: d522-ssid-wmm-ac_vi_stats_wmmpacketsreceived
name: D522 WmmPacketsReceived.AC_VI
source:
  row: 522
  object: WiFi.SSID.{i}.Stats.WmmPacketsReceived.
  api: AC_VI
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_refresh
  target: dut
  action: exec
  capture: refresh_5g
  command: ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n '/WmmPacketsReceived =
    {/,/}/s/^[[:space:]]*AC_VI = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmPacketsReceived5g=\1/p'
  expected: getSSIDStats() 匯出 WmmPacketsReceived.AC_VI
  description: SSID.4 (5g) getSSIDStats() WmmPacketsReceived.AC_VI refresh
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.SSID.4.Stats.WmmPacketsReceived.AC_VI?"'
  expected: Stats.WmmPacketsReceived.AC_VI getter 回傳有效值
  description: SSID.4 (5g) direct Stats.WmmPacketsReceived.AC_VI
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 wme_counters | grep -A2 '^AC_VI:' | awk '/rx frames:/ 
    {print "DriverWmmPacketsReceived5g="$3}'
  expected: wl0 wme_counters 匯出 AC_VI rx frames
  description: SSID.4 (5g) driver AC_VI rx frames
- id: step_6g_refresh
  target: dut
  action: exec
  capture: refresh_6g
  command: ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n '/WmmPacketsReceived =
    {/,/}/s/^[[:space:]]*AC_VI = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmPacketsReceived6g=\1/p'
  expected: getSSIDStats() 匯出 WmmPacketsReceived.AC_VI
  description: SSID.6 (6g) getSSIDStats() WmmPacketsReceived.AC_VI refresh
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.SSID.6.Stats.WmmPacketsReceived.AC_VI?"'
  expected: Stats.WmmPacketsReceived.AC_VI getter 回傳有效值
  description: SSID.6 (6g) direct Stats.WmmPacketsReceived.AC_VI
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 wme_counters | grep -A2 '^AC_VI:' | awk '/rx frames:/ 
    {print "DriverWmmPacketsReceived6g="$3}'
  expected: wl1 wme_counters 匯出 AC_VI rx frames
  description: SSID.6 (6g) driver AC_VI rx frames
- id: step_24g_refresh
  target: dut
  action: exec
  capture: refresh_24g
  command: ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n '/WmmPacketsReceived =
    {/,/}/s/^[[:space:]]*AC_VI = 
    \([0-9][0-9]*\).*/GetSSIDStatsWmmPacketsReceived24g=\1/p'
  expected: getSSIDStats() 匯出 WmmPacketsReceived.AC_VI
  description: SSID.8 (2.4g) getSSIDStats() WmmPacketsReceived.AC_VI refresh
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.SSID.8.Stats.WmmPacketsReceived.AC_VI?"'
  expected: Stats.WmmPacketsReceived.AC_VI getter 回傳有效值
  description: SSID.8 (2.4g) direct Stats.WmmPacketsReceived.AC_VI
- id: step_24g_driver
  target: dut
  action: exec
  capture: driver_24g
  command: wl -i wl2 wme_counters | grep -A2 '^AC_VI:' | awk '/rx frames:/ 
    {print "DriverWmmPacketsReceived24g="$3}'
  expected: wl2 wme_counters 匯出 AC_VI rx frames
  description: SSID.8 (2.4g) driver AC_VI rx frames
pass_criteria:
- field: direct_5g.AC_VI
  operator: equals
  reference: refresh_5g.GetSSIDStatsWmmPacketsReceived5g
  description: 5g direct Stats.WmmPacketsReceived.AC_VI must match 
    getSSIDStats().WmmPacketsReceived.AC_VI after refresh.
- field: direct_5g.AC_VI
  operator: equals
  reference: driver_5g.DriverWmmPacketsReceived5g
  description: 5g direct Stats.WmmPacketsReceived.AC_VI must match wl0 
    wme_counters AC_VI rx frames.
- field: direct_6g.AC_VI
  operator: equals
  reference: refresh_6g.GetSSIDStatsWmmPacketsReceived6g
  description: 6g direct Stats.WmmPacketsReceived.AC_VI must match 
    getSSIDStats().WmmPacketsReceived.AC_VI after refresh.
- field: direct_6g.AC_VI
  operator: equals
  reference: driver_6g.DriverWmmPacketsReceived6g
  description: 6g direct Stats.WmmPacketsReceived.AC_VI must match wl1 
    wme_counters AC_VI rx frames.
- field: direct_24g.AC_VI
  operator: equals
  reference: refresh_24g.GetSSIDStatsWmmPacketsReceived24g
  description: 2.4g direct Stats.WmmPacketsReceived.AC_VI must match 
    getSSIDStats().WmmPacketsReceived.AC_VI after refresh.
- field: direct_24g.AC_VI
  operator: equals
  reference: driver_24g.DriverWmmPacketsReceived24g
  description: 2.4g direct Stats.WmmPacketsReceived.AC_VI must match wl2 
    wme_counters AC_VI rx frames.
verification_command:
- 'ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n ''/WmmPacketsReceived = {/,/}/s/^[[:space:]]*AC_VI
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmPacketsReceived5g=\1/p'''
- 'ubus-cli "WiFi.SSID.4.Stats.WmmPacketsReceived.AC_VI?"'
- 'wl -i wl0 wme_counters | grep -A2 ''^AC_VI:'' | awk ''/rx frames:/ {print "DriverWmmPacketsReceived5g="$3}'''
- 'ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n ''/WmmPacketsReceived = {/,/}/s/^[[:space:]]*AC_VI
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmPacketsReceived6g=\1/p'''
- 'ubus-cli "WiFi.SSID.6.Stats.WmmPacketsReceived.AC_VI?"'
- 'wl -i wl1 wme_counters | grep -A2 ''^AC_VI:'' | awk ''/rx frames:/ {print "DriverWmmPacketsReceived6g="$3}'''
- 'ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n ''/WmmPacketsReceived = {/,/}/s/^[[:space:]]*AC_VI
  = \([0-9][0-9]*\).*/GetSSIDStatsWmmPacketsReceived24g=\1/p'''
- 'ubus-cli "WiFi.SSID.8.Stats.WmmPacketsReceived.AC_VI?"'
- 'wl -i wl2 wme_counters | grep -A2 ''^AC_VI:'' | awk ''/rx frames:/ {print "DriverWmmPacketsReceived24g="$3}'''
