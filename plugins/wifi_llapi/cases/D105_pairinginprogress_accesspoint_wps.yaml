id: wifi-llapi-D105-pairinginprogress-accesspoint-wps
name: PairingInProgress — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  row: 105
  object: WiFi.AccessPoint.{i}.WPS.
  api: PairingInProgress
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WPS.PairingInProgress?"
llapi_support: Support
implemented_by: Vendor Module
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: "Topology:\n  - DUT: COM1 (B0, AP role)\n  Transport:\n  - DUT via
  serialwrap COM0\n  Baseline:\n  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal\n\
  \  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE\n  - 2.4G = AP5 / wl2 /
  testpilot2G / WPA2-Personal\n  Notes:\n  - Workbook row 105 is a method case: enable
  WPS, initiate PBC pairing, then read PairingInProgress.\n  - 5G and 2.4G are expected
  to enter an active WPS session.\n  - 6G under WPA3/SAE remains Not Supported, so
  PairingInProgress stays 0 and hostapd does not enter an active PBC session."
steps:
- id: step_5g_pbc
  action: exec
  target: DUT
  command:
  - 'ubus-cli "WiFi.AccessPoint.1.WPS.Enable=1" 2>/dev/null'
  - sleep 2
  - 'ubus-cli "WiFi.AccessPoint.1.WPS.InitiateWPSPBC()" 2>/dev/null'
  - sleep 2
  - 'echo "PairingInProgress5g=$(ubus-cli ''WiFi.AccessPoint.1.WPS.PairingInProgress?''
    2>/dev/null | grep -o ''PairingInProgress=[0-9]*'' | cut -d= -f2)"'
  - 'echo "PbcStatus5g=$(hostapd_cli -i wl0 wps_get_status 2>/dev/null | sed -n ''1s/PBC
    Status: //p'')"'
  - 'ubus-cli "WiFi.AccessPoint.1.WPS.cancelWPSPairing()" 2>/dev/null || true'
  - 'ubus-cli "WiFi.AccessPoint.1.WPS.Enable=0" 2>/dev/null'
  capture: pair_5g
- id: step_6g_pbc
  action: exec
  target: DUT
  depends_on: step_5g_pbc
  command:
  - 'ubus-cli "WiFi.AccessPoint.3.WPS.Enable=1" 2>/dev/null'
  - sleep 2
  - 'ubus-cli "WiFi.AccessPoint.3.WPS.InitiateWPSPBC()" 2>/dev/null'
  - sleep 2
  - 'echo "PairingInProgress6g=$(ubus-cli ''WiFi.AccessPoint.3.WPS.PairingInProgress?''
    2>/dev/null | grep -o ''PairingInProgress=[0-9]*'' | cut -d= -f2)"'
  - 'echo "PbcStatus6g=$(hostapd_cli -i wl1 wps_get_status 2>/dev/null | sed -n ''1s/PBC
    Status: //p'')"'
  - 'ubus-cli "WiFi.AccessPoint.3.WPS.cancelWPSPairing()" 2>/dev/null || true'
  - 'ubus-cli "WiFi.AccessPoint.3.WPS.Enable=0" 2>/dev/null'
  capture: pair_6g
- id: step_24g_pbc
  action: exec
  target: DUT
  depends_on: step_6g_pbc
  command:
  - 'ubus-cli "WiFi.AccessPoint.5.WPS.Enable=1" 2>/dev/null'
  - sleep 2
  - 'ubus-cli "WiFi.AccessPoint.5.WPS.InitiateWPSPBC()" 2>/dev/null'
  - sleep 2
  - 'echo "PairingInProgress24g=$(ubus-cli ''WiFi.AccessPoint.5.WPS.PairingInProgress?''
    2>/dev/null | grep -o ''PairingInProgress=[0-9]*'' | cut -d= -f2)"'
  - 'echo "PbcStatus24g=$(hostapd_cli -i wl2 wps_get_status 2>/dev/null | sed -n ''1s/PBC
    Status: //p'')"'
  - 'ubus-cli "WiFi.AccessPoint.5.WPS.cancelWPSPairing()" 2>/dev/null || true'
  - 'ubus-cli "WiFi.AccessPoint.5.WPS.Enable=0" 2>/dev/null'
  capture: pair_24g
pass_criteria:
- field: pair_5g.PairingInProgress5g
  operator: equals
  value: '1'
  description: 5g PairingInProgress=1 after PBC start
- field: pair_5g.PbcStatus5g
  operator: equals
  value: Active
  description: 5g hostapd PBC Status=Active
- field: pair_6g.PairingInProgress6g
  operator: equals
  value: '0'
  description: 6g PairingInProgress stays 0 under WPA3/SAE
- field: pair_24g.PairingInProgress24g
  operator: equals
  value: '1'
  description: 2.4g PairingInProgress=1 after PBC start
- field: pair_24g.PbcStatus24g
  operator: equals
  value: Active
  description: 2.4g hostapd PBC Status=Active
verification_command:
- 'hostapd_cli -i wl0 wps_get_status'
- 'hostapd_cli -i wl1 wps_get_status'
- 'hostapd_cli -i wl2 wps_get_status'
