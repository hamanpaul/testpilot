  bssid=6C:15:DB:74:C0:B5

  ssid=5G_Primary-BE

  ignore_broadcast_ssid=2


  ignore_broadcast_ssid=0 => "SSID not Hidden"

  ignore_broadcast_ssid=2 => "SSID Hidden"'
