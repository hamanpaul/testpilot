id: wifi-llapi-D079-mode-accesspoint-macfiltering
name: "Mode — WiFi.AccessPoint.{i}.MACFiltering.Mode"
version: '1.1'
source:
  row: 79
  object: WiFi.AccessPoint.{i}.MACFiltering.Mode
  api: Mode
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.1.MACFiltering.Mode=Off
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; MACFiltering.Mode is calibrated as an AP-only setter/getter case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing MACFiltering.Mode
  - the raw DUT baseline can start with `MACFiltering.Mode="Off"` on AP1/AP3/AP5 and no hostapd ACL lines
  - a deterministic workbook-style baseline can be rebuilt by adding one probe MAC per band, then setting AP1=`WhiteList`, AP3=`BlackList`, and AP5=`BlackList`
  - under that rebuilt baseline, AP1 `/tmp/wl0_hapd.conf` converges to `macaddr_acl=1` + `accept_mac_file=/tmp/hostap_wl0.acl`, while AP3/AP5 converge to `macaddr_acl=0` + `deny_mac_file=/tmp/hostap_wl{1,2}.acl`
  - once the workbook-style baseline is present, `ubus-cli WiFi.AccessPoint.{1|3|5}.MACFiltering.Mode=Off` still returns `invalid value` and leaves the getter / hostapd ACL state unchanged on all three bands
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - remove the band-specific probe MAC before rebuilding the workbook row-79 mode baseline
     - add one probe MAC per band, then set AP1=`WhiteList`, AP3=`BlackList`, and AP5=`BlackList`
   2) Per-band MACFiltering.Mode probe:
      - capture the rebuilt getter and hostapd ACL state for AP1 / AP3 / AP5
      - attempt `MACFiltering.Mode=Off` on the same AP
      - re-read the getter and hostapd ACL state immediately after the setter attempt
   3) Verdict model:
      - this is a workbook-shaped pass case: the DUT must first match the row-79 mode baseline, then prove the `Off` setter is rejected while the rebuilt state stays unchanged
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    ubus-cli "WiFi.AccessPoint.1.MACFiltering.delEntry(mac=62:2F:B8:66:BB:82)" 2>/dev/null || true
    ubus-cli "WiFi.AccessPoint.3.MACFiltering.delEntry(mac=FA:DD:AC:24:5A:B4)" 2>/dev/null || true
    ubus-cli "WiFi.AccessPoint.5.MACFiltering.delEntry(mac=FA:A0:DF:91:47:7C)" 2>/dev/null || true
    ubus-cli "WiFi.AccessPoint.1.MACFiltering.addEntry(mac=62:2F:B8:66:BB:82)"
    ubus-cli WiFi.AccessPoint.1.MACFiltering.Mode=WhiteList
    ubus-cli "WiFi.AccessPoint.3.MACFiltering.addEntry(mac=FA:DD:AC:24:5A:B4)"
    ubus-cli WiFi.AccessPoint.3.MACFiltering.Mode=BlackList
    ubus-cli "WiFi.AccessPoint.5.MACFiltering.addEntry(mac=FA:A0:DF:91:47:7C)"
    ubus-cli WiFi.AccessPoint.5.MACFiltering.Mode=BlackList
    sleep 2
test_procedure: |
  1) Rebuild the workbook row-79 baseline in setup: add one probe MAC per band, then set AP1=`WhiteList`, AP3=`BlackList`, and AP5=`BlackList`.
  2) Capture MACFiltering.Mode getter + hostapd ACL state on AP1 / AP3 / AP5 and confirm they match the workbook baseline (`WhiteList/BlackList/BlackList` with accept/deny ACL files).
  3) Attempt `ubus-cli WiFi.AccessPoint.{i}.MACFiltering.Mode=Off` on the same AP.
  4) Re-read the getter and hostapd ACL state immediately after the setter attempt.
  5) Confirm the setter reports `invalid value` and the rebuilt workbook state remains unchanged on all three bands.
  Verdict: Pass. The current DUT can reproduce the workbook row-79 mode baseline exactly, and the `Mode=Off` setter is rejected while the getter / hostapd ACL state remains aligned with the workbook evidence.

steps:
- id: step1_mode_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n'
    "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MACFiltering\.Mode="\([^"]*\)".*/\1/p'
    | head -n 1); if [ -n "$MODE" ]; then printf 'BaselineMode5g=%s\n' "$MODE"; else
    echo 'BaselineMode5g=EMPTY'; fi; CFG=$(grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)='
    /tmp/wl0_hapd.conf 2>/dev/null || true); ACL=$(printf '%s\n' "$CFG" | sed -n 's/^[0-9][0-9]*:macaddr_acl=\(.*\)$/\1/p'
    | head -n 1); if [ -n "$ACL" ]; then printf 'BaselineMacaddrAcl5g=%s\n' "$ACL";
    else echo 'BaselineMacaddrAcl5g=ABSENT'; fi; if printf '%s\n' "$CFG" | grep -q
    'accept_mac_file='; then echo 'BaselineAclState5g=accept'; elif printf '%s\n'
    "$CFG" | grep -q 'deny_mac_file='; then echo 'BaselineAclState5g=deny'; else echo
    'BaselineAclState5g=absent'; fi
  capture: mode_baseline_5g
- id: step2_set_off_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli WiFi.AccessPoint.1.MACFiltering.Mode=Off 2>&1 || true); printf
    '%s\n' "$OUT"; if printf '%s\n' "$OUT" | grep -q 'invalid value'; then echo 'SetOffStatus5g=invalid_value';
    else echo 'SetOffStatus5g=accepted'; fi
  depends_on: step1_mode_baseline_5g
  capture: set_off_5g
- id: step3_mode_after_set_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n'
