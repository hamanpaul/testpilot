id: wifi-llapi-r088-accesspoint-status
name: Status — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 88
  object: WiFi.AccessPoint.{i}.
  api: Status
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Status=Enabled
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli WiFi.AccessPoint.{i}.Enable=1
  note: Set Access Point Enable=1, Disable=0
- id: step2
  action: exec
  target: DUT
  command: ubus-cli WiFi.AccessPoint.? | grep .Status
  capture: result
  depends_on: step1
  note: Get Access Point Status
pass_criteria:
- field: result.Status
  operator: contains
  value: Enabled
  description: Status 應回傳包含 Status=Enabled
verification_command: 'root@prplOS:/# wl -i wl0 bss

  up

  root@prplOS:/# wl -i wl1 bss

  up

  root@prplOS:/# wl -i wl2 bss

  up'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
