pass_criteria:
- field: mode_baseline_5g.BaselineMode5g
  operator: equals
  value: WhiteList
  description: 5G AP1 / wl0 should start from the rebuilt workbook WhiteList 
    baseline.
- field: mode_baseline_5g.BaselineMacaddrAcl5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 hostapd should keep macaddr_acl=1 on the workbook 
    WhiteList baseline.
- field: mode_baseline_5g.BaselineAclState5g
  operator: equals
  value: accept
  description: 5G AP1 / wl0 hostapd should point at accept_mac_file on the 
    workbook WhiteList baseline.
- field: set_off_5g.SetOffStatus5g
  operator: equals
  value: invalid_value
  description: 5G AP1 / wl0 still rejects the workbook Off setter as invalid.
- field: mode_after_set_5g.AfterMode5g
  operator: equals
  value: WhiteList
  description: 5G AP1 / wl0 getter stays WhiteList after the rejected Off 
    setter.
- field: mode_after_set_5g.AfterMode5g
  operator: equals
  reference: mode_baseline_5g.BaselineMode5g
  description: 5G AP1 / wl0 getter remains unchanged across the failed setter 
    attempt.
- field: mode_after_set_5g.AfterMacaddrAcl5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 hostapd macaddr_acl remains unchanged after the 
    failed setter.
- field: mode_after_set_5g.AfterAclState5g
  operator: equals
  value: accept
  description: 5G AP1 / wl0 hostapd keep accept_mac_file after the failed 
    setter.
- field: mode_after_set_5g.AfterAclState5g
  operator: equals
  reference: mode_baseline_5g.BaselineAclState5g
  description: 5G AP1 / wl0 ACL file state remains unchanged across the failed 
    setter attempt.
- field: mode_baseline_6g.BaselineMode6g
  operator: equals
  value: BlackList
  description: 6G AP3 / wl1 getter should start from the rebuilt workbook 
    BlackList baseline.
- field: mode_baseline_6g.BaselineMacaddrAcl6g
  operator: equals
  value: '0'
  description: 6G AP3 / wl1 hostapd should keep macaddr_acl=0 on the workbook 
    BlackList baseline.
- field: mode_baseline_6g.BaselineAclState6g
  operator: equals
  value: deny
  description: 6G AP3 / wl1 hostapd should expose deny_mac_file on the workbook 
    BlackList baseline.
- field: set_off_6g.SetOffStatus6g
  operator: equals
  value: invalid_value
  description: 6G AP3 / wl1 still rejects the workbook Off setter as invalid on 
    the rebuilt BlackList baseline.
- field: mode_after_set_6g.AfterMode6g
  operator: equals
  value: BlackList
  description: 6G AP3 / wl1 getter remains BlackList after the rejected setter.
- field: mode_after_set_6g.AfterMode6g
  operator: equals
  reference: mode_baseline_6g.BaselineMode6g
  description: 6G AP3 / wl1 getter remains unchanged across the failed setter 
    attempt.
- field: mode_after_set_6g.AfterMacaddrAcl6g
  operator: equals
  value: '0'
  description: 6G AP3 / wl1 hostapd still has macaddr_acl=0 after the failed 
    setter.
- field: mode_after_set_6g.AfterAclState6g
  operator: equals
  value: deny
  description: 6G AP3 / wl1 hostapd still exposes deny_mac_file after the failed
    setter.
- field: mode_after_set_6g.AfterAclState6g
  operator: equals
  reference: mode_baseline_6g.BaselineAclState6g
  description: 6G AP3 / wl1 ACL file state remains unchanged across the failed 
    setter attempt.
- field: mode_baseline_24g.BaselineMode24g
  operator: equals
  value: BlackList
  description: 2.4G AP5 / wl2 getter should start from the rebuilt workbook 
    BlackList baseline.
- field: mode_baseline_24g.BaselineMacaddrAcl24g
  operator: equals
  value: '0'
  description: 2.4G AP5 / wl2 hostapd should keep macaddr_acl=0 on the workbook 
    BlackList baseline.
- field: mode_baseline_24g.BaselineAclState24g
  operator: equals
  value: deny
  description: 2.4G AP5 / wl2 hostapd should expose deny_mac_file on the 
    workbook BlackList baseline.
- field: set_off_24g.SetOffStatus24g
  operator: equals
  value: invalid_value
  description: 2.4G AP5 / wl2 still rejects the workbook Off setter as invalid 
    on the rebuilt BlackList baseline.
- field: mode_after_set_24g.AfterMode24g
  operator: equals
  value: BlackList
  description: 2.4G AP5 / wl2 getter remains BlackList after the rejected 
    setter.
- field: mode_after_set_24g.AfterMode24g
  operator: equals
  reference: mode_baseline_24g.BaselineMode24g
  description: 2.4G AP5 / wl2 getter remains unchanged across the failed setter 
