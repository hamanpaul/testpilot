id: d251-radio-vendor-regulatorydomainrev
name: D251 Radio Vendor RegulatoryDomainRev
source:
  row: 251
  object: WiFi.Radio.{i}.Vendor.
  api: RegulatoryDomain
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'workbook pass intent is setter-backed 0 -> 8 -> 0 replay with supported-list capture, while wl country remains #a (#a/0) <unknown> per row-note RD override'
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step1_regrev_default_5g
  target: DUT
  action: exec
  band: 5g
  capture: default_5g
  command: >-
    ubus-cli "WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev?" | sed -n 's/.*=\([0-9][0-9]*\).*/DefRegRev5g=\1/p'
  expected: 5g 預設 RegulatoryDomainRev 應為 0
  description: Radio.1 (5g) 先確認 Vendor.Brcm.RegulatoryDomainRev 初值為 0。
- id: step2_regrev_set_5g
  target: DUT
  action: exec
  band: 5g
  capture: set_5g
  command:
  - printf 'ReqRegRev5g=8\n'
  - ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=8
  expected: 5g setter 應接受 8
  depends_on: step1_regrev_default_5g
  description: Radio.1 (5g) 將 RegulatoryDomainRev 設為 8。
- id: step3_regrev_after_set_5g
  target: DUT
  action: exec
  band: 5g
  capture: after_set_5g
  command:
  - sleep 5
  - >-
    ubus-cli "WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev?" | sed -n 's/.*=\([0-9][0-9]*\).*/AfterSetRegRev5g=\1/p'
  expected: 5g setter=8 後 getter 應回報 8
  depends_on: step2_regrev_set_5g
  description: Radio.1 (5g) setter=8 後驗證 getter readback。
- id: step4_regdom_supported_5g
  target: DUT
  action: exec
  band: 5g
  capture: supported_5g
  command: >-
    ubus-cli "WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainSupported?" | sed -n 's/.*="\([^"]*\)".*/RegDomSupported5g=\1/p'
  expected: 5g supported list 應維持有效且包含 #a
  depends_on: step3_regrev_after_set_5g
  description: Radio.1 (5g) 捕捉 RegulatoryDomainSupported 清單。
- id: step5_country_5g
  target: DUT
  action: exec
  band: 5g
  capture: country_5g
  command: >-
    wl -i wl0 country | sed -n '1s/^/Country5g=/p'
  expected: 5g wl country 應維持 #a (#a/0) <unknown>
  depends_on: step4_regdom_supported_5g
  description: Radio.1 (5g) 驗證 wl country 維持 workbook note 記載的 #a invariant。
- id: step6_regrev_restore_5g
  target: DUT
  action: exec
  band: 5g
  capture: restore_5g
  command:
  - printf 'RestoreRegRev5g=0\n'
  - ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
  expected: 5g restore 應接受 0
  depends_on: step5_country_5g
  description: Radio.1 (5g) restore 回 0。
- id: step7_regrev_after_restore_5g
  target: DUT
  action: exec
  band: 5g
  capture: after_restore_5g
  command:
  - sleep 5
  - >-
    ubus-cli "WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev?" | sed -n 's/.*=\([0-9][0-9]*\).*/AfterRestoreRegRev5g=\1/p'
  expected: 5g restore 後 getter 應回報 0
  depends_on: step6_regrev_restore_5g
  description: Radio.1 (5g) restore 後再次確認 getter。
- id: step8_regrev_default_6g
  target: DUT
  action: exec
  band: 6g
  capture: default_6g
  command: >-
    ubus-cli "WiFi.Radio.2.Vendor.Brcm.RegulatoryDomainRev?" | sed -n 's/.*=\([0-9][0-9]*\).*/DefRegRev6g=\1/p'
  expected: 6g 預設 RegulatoryDomainRev 應為 0
  description: Radio.2 (6g) 先確認 Vendor.Brcm.RegulatoryDomainRev 初值為 0。
- id: step9_regrev_set_6g
  target: DUT
  action: exec
  band: 6g
  capture: set_6g
  command:
