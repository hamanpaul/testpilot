id: d396-getradiostats-errorsreceived
name: D396 getRadioStats ErrorsReceived
source:
  row: 396
  object: WiFi.Radio.{i}.Stats.
  api: ErrorsReceived
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_stats
  target: dut
  action: read
  capture: stats_5g
  command: ubus-cli "WiFi.Radio.1.Stats.ErrorsReceived?"
  expected: ErrorsReceived 回傳有效值
  description: Radio.1 (5g) ErrorsReceived getter (Stats. 直接讀)
- id: step_6g_stats
  target: dut
  action: read
  capture: stats_6g
  command: ubus-cli "WiFi.Radio.2.Stats.ErrorsReceived?"
  expected: ErrorsReceived 回傳有效值
  description: Radio.2 (6g) ErrorsReceived getter (Stats. 直接讀)
- id: step_24g_stats
  target: dut
  action: read
  capture: stats_24g
  command: ubus-cli "WiFi.Radio.3.Stats.ErrorsReceived?"
  expected: ErrorsReceived 回傳有效值
  description: Radio.3 (2.4g) ErrorsReceived getter (Stats. 直接讀)
pass_criteria:
- field: stats_5g.ErrorsReceived
  operator: regex
  value: ^\d+$
- field: stats_6g.ErrorsReceived
  operator: regex
  value: ^\d+$
- field: stats_24g.ErrorsReceived
  operator: regex
  value: ^\d+$
