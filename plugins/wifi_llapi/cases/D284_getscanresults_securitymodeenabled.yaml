id: d284-getscanresults-securitymodeenabled
name: D284 getScanResults SecurityModeEnabled
source:
  row: 284
  object: WiFi.Radio.{i}.
  api: getScanResults()
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_scan
  target: dut
  action: exec
  capture: llapi_5g
  command: 'BLOCK=$(ubus-cli "WiFi.Radio.1.getScanResults()" | head -60 | sed -n "/BSSID
    = /,/^        },/p"); BSSID=$(printf "%s\n" "$BLOCK" | sed -n ''s/.*BSSID = "\([^"]*\)".*/\1/p''
    | head -n1); SEC=$(printf "%s\n" "$BLOCK" | sed -n ''s/.*SecurityModeEnabled =
    "\([^"]*\)".*/\1/p'' | head -n1); [ -n "$BSSID" ] && printf "LlapiBssid5g=%s\n"
    "$(printf "%s" "$BSSID" | tr "A-F" "a-f")"; [ -n "$SEC" ] && printf "LlapiSecurityMode5g=%s\n"
    "$SEC"'
  expected: 5G 第一個 serialized scan object 需提供 BSSID 與 SecurityModeEnabled
  description: Radio.1 (5g) 以 first-object capture 驗證 SecurityModeEnabled
- id: step_5g_iw_scan
  target: dut
  action: exec
  capture: iw_5g
  command: 'TARGET="{{llapi_5g.LlapiBssid5g}}"; BLOCK=$(iw dev wl0 scan | grep -A40
    -im1 "^BSS $TARGET"); AUTH=$(printf "%s\n" "$BLOCK" | sed -n ''s/.*Authentication
    suites: \(.*\)$/\1/p'' | tr "\n" ";"); AUTH=${AUTH%;}; HAS_RSN=0; HAS_WPA=0; HAS_PSK=0;
    HAS_SAE=0; printf "%s\n" "$BLOCK" | grep -q "RSN:" && HAS_RSN=1; printf "%s\n"
    "$BLOCK" | grep -q "WPA:" && HAS_WPA=1; printf "%s\n" "$BLOCK" | grep -Eq ''Authentication
    suites: .*PSK|Authentication suites: .*00-0f-ac:2|Authentication suites: .*00-50-f2:2''
    && HAS_PSK=1; printf "%s\n" "$BLOCK" | grep -Eq ''Authentication suites: .*00-0f-ac:8|Authentication
    suites: .*00-0f-ac:24|Authentication suites: .*SAE'' && HAS_SAE=1; MODE=None;
    if [ "$HAS_RSN" -eq 1 ] && [ "$HAS_SAE" -eq 1 ] && [ "$HAS_PSK" -eq 1 ]; then
    MODE=WPA2-WPA3-Personal; elif [ "$HAS_RSN" -eq 1 ] && [ "$HAS_SAE" -eq 1 ]; then
    MODE=WPA3-Personal; elif [ "$HAS_RSN" -eq 1 ] && [ "$HAS_WPA" -eq 1 ] && [ "$HAS_PSK"
    -eq 1 ]; then MODE=WPA-WPA2-Personal; elif [ "$HAS_RSN" -eq 1 ] && [ "$HAS_PSK"
    -eq 1 ]; then MODE=WPA2-Personal; elif [ "$HAS_WPA" -eq 1 ] && [ "$HAS_PSK" -eq
    1 ]; then MODE=WPA-Personal; elif [ "$HAS_RSN" -eq 1 ]; then MODE=WPA2-Enterprise;
    elif [ "$HAS_WPA" -eq 1 ]; then MODE=WPA-Enterprise; fi; [ -n "$AUTH" ] && printf
    "IwAuth5g=%s\n" "$AUTH"; printf "IwSecurityMode5g=%s\n" "$MODE"'
  expected: wl0 scan 需能對同一個 first-object target 回放 security mode
  description: wl0 scan 對位 5G first-object target 的 security mode
- id: step_6g_scan
  target: dut
