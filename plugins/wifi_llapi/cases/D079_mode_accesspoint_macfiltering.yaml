    /tmp/wl1_hapd.conf 2>/dev/null || true); ACL=$(printf '%s\n' "$CFG" | sed -n 's/^[0-9][0-9]*:macaddr_acl=\(.*\)$/\1/p'
    | head -n 1); if [ -n "$ACL" ]; then printf 'AfterMacaddrAcl6g=%s\n' "$ACL"; else
    echo 'AfterMacaddrAcl6g=ABSENT'; fi; if printf '%s\n' "$CFG" | grep -q 'accept_mac_file=';
