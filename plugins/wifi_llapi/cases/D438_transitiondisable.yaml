pass_criteria:
- field: transitiondisable_baseline_5g.BaselineGetterTransitionDisable5g
  operator: equals
  value: '""'
  description: 5G AP1 / wl0 getter should start from the default empty 
    TransitionDisable value.
- field: transitiondisable_baseline_5g.BaselineHostapdTransitionDisable5g
  operator: equals
  value: ABSENT
  description: 5G AP1 / wl0 hostapd should expose no `transition_disable=` at 
    baseline.
- field: transitiondisable_baseline_6g.BaselineGetterTransitionDisable6g
  operator: equals
  value: '""'
  description: 6G AP3 / wl1 getter should start from the default empty 
    TransitionDisable value.
- field: transitiondisable_baseline_6g.BaselineHostapdTransitionDisable6g
  operator: equals
  value: ABSENT
  description: 6G AP3 / wl1 hostapd should expose no `transition_disable=` at 
    baseline.
- field: transitiondisable_baseline_24g.BaselineGetterTransitionDisable24g
  operator: equals
  value: '""'
  description: 2.4G AP5 / wl2 getter should start from the default empty 
    TransitionDisable value.
- field: transitiondisable_baseline_24g.BaselineHostapdTransitionDisable24g
  operator: equals
  value: ABSENT
  description: 2.4G AP5 / wl2 hostapd should expose no `transition_disable=` at 
    baseline.
- field: 
    transitiondisable_after_wpa3_personal_5g.AfterWpa3PersonalGetterTransitionDisable5g
  operator: equals
  value: '"WPA3-Personal"'
  description: 5G AP1 / wl0 getter should read back WPA3-Personal after the 
    workbook setter.
- field: 
    transitiondisable_after_wpa3_personal_5g.AfterWpa3PersonalHostapdTransitionDisable5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 hostapd should map WPA3-Personal to bit 1.
- field: 
    transitiondisable_after_wpa3_personal_6g.AfterWpa3PersonalGetterTransitionDisable6g
