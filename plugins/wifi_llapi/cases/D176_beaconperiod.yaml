id: d176-radio-beaconperiod
name: D176 Radio BeaconPeriod
hlapi_command: ubus-cli WiFi.Radio.1.BeaconPeriod=1000
source:
  row: 176
  object: WiFi.Radio.{i}.
  api: BeaconPeriod
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
sta_env_setup: |
  DUT:
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.2.BeaconPeriod=100
    ubus-cli WiFi.Radio.3.BeaconPeriod=100
    sleep 3
steps:
- id: step1_beacon_baseline_getter_5g
  target: DUT
  action: read
  capture: baseline_getter_5g
  command: ubus-cli "WiFi.Radio.1.BeaconPeriod?"
  expected: 基線 BeaconPeriod 預設值應為 100
  description: Radio.1 (5g) 先確認 getter 基線為 100。
- id: step2_beacon_baseline_hostapd_5g
  target: DUT
  action: exec
  capture: baseline_hostapd_5g
  command: grep '^beacon_int=' /tmp/wl0_hapd.conf | sed -n 
    '1s/^beacon_int=/BaselineHostapdBeaconPeriod5g=/p'
  expected: hostapd beacon_int 基線值應為 100
  depends_on: step1_beacon_baseline_getter_5g
  description: Radio.1 (5g) hostapd config 基線應同步為 100。
- id: step3_beacon_set_5g
  target: DUT
  action: exec
  capture: set_5g
  command:
  - printf 'RequestedBeaconPeriod5g=1000\n'
  - ubus-cli WiFi.Radio.1.BeaconPeriod=1000
  expected: setter 應接受 1000
  depends_on: step2_beacon_baseline_hostapd_5g
  description: Radio.1 (5g) 將 BeaconPeriod 設為 1000。
- id: step4_beacon_after_set_getter_5g
  target: DUT
  action: exec
  capture: after_set_getter_5g
  command: sleep 3; ubus-cli "WiFi.Radio.1.BeaconPeriod?"
  expected: getter 應回到 1000
  depends_on: step3_beacon_set_5g
  description: Radio.1 (5g) setter 後 getter 應回 1000。
- id: step5_beacon_after_set_hostapd_5g
  target: DUT
  action: exec
  capture: after_set_hostapd_5g
  command: grep '^beacon_int=' /tmp/wl0_hapd.conf | sed -n 
    '1s/^beacon_int=/AfterSetHostapdBeaconPeriod5g=/p'
  expected: hostapd beacon_int 應同步為 1000
  depends_on: step4_beacon_after_set_getter_5g
  description: Radio.1 (5g) hostapd config 應同步切到 1000。
- id: step6_beacon_restore_5g
  target: DUT
  action: exec
  capture: restore_5g
  command:
  - printf 'RestoreBeaconPeriod5g=100\n'
  - ubus-cli WiFi.Radio.1.BeaconPeriod=100
  expected: setter 應接受 restore 100
  depends_on: step5_beacon_after_set_hostapd_5g
  description: Radio.1 (5g) 將 BeaconPeriod restore 回 100。
- id: step7_beacon_after_restore_getter_5g
  target: DUT
  action: exec
  capture: after_restore_getter_5g
  command: sleep 3; ubus-cli "WiFi.Radio.1.BeaconPeriod?"
  expected: getter 應回到 100
  depends_on: step6_beacon_restore_5g
  description: Radio.1 (5g) restore 後 getter 應回 100。
- id: step8_beacon_after_restore_hostapd_5g
  target: DUT
  action: exec
  capture: after_restore_hostapd_5g
