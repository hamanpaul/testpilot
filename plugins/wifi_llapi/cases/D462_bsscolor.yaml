id: d462-radio-bsscolor
name: D462 Radio BssColor
source:
  row: 462
  object: WiFi.Radio.{i}.IEEE80211ax.
  api: BssColor
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.IEEE80211ax.BssColor?"
  expected: BssColor 回傳有效值
  description: Radio.1 (5g) BssColor getter（live=0）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.IEEE80211ax.BssColor?"
  expected: BssColor 回傳有效值
  description: Radio.2 (6g) BssColor getter（live=0）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.IEEE80211ax.BssColor?"
  expected: BssColor 回傳有效值
  description: Radio.3 (2.4g) BssColor getter（live=0）
pass_criteria:
- field: getter_5g.BssColor
  operator: regex
  value: ^\d+$
- field: getter_6g.BssColor
  operator: regex
  value: ^\d+$
- field: getter_24g.BssColor
  operator: regex
  value: ^\d+$
