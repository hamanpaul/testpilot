id: wifi-llapi-D047-supportedhe160mcs
name: "SupportedHe160MCS — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 47
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: SupportedHe160MCS
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SupportedHe160MCS?"'
llapi_support: Not Supported
implemented_by: pWHM
bands: ["5g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: 5g
        mode: sta
        ssid: testpilot5G
        key: '00000000'
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the validated generic 5G single-band baseline for this case
setup_steps: |
  1) DUT 5G baseline:
     - let the plugin auto-prepare Radio.1 / SSID.4 / AP1 with the validated generic 5G profile
     - keep the live SSID/credential pair at testpilot5G / 00000000
  2) STA 5G preparation:
     - let the plugin baseline workflow reset COM0 wl0 and connect it to testpilot5G with WPA2-PSK
     - keep only one associated station on AP1 before AssociatedDevice.1 sampling
  3) Association evidence:
     - COM0: iw dev wl0 link ; wpa_cli -p /var/run/wpa_supplicant -i wl0 status
     - COM1: wl -i wl0 assoclist
test_procedure: |
  1) Resolve COM0 wl0's live STA MAC and require AP1 AssociatedDevice.1 to point to that same station.
  2) Query WiFi.AccessPoint.1.AssociatedDevice.1.SupportedHe160MCS on DUT and record the not-supported error.
  3) Cross-check the same AssociatedDevice entry for Rx/TxSupportedHe160MCS sibling fields.
  4) Confirm wl0 sta_info for the same STA still exposes HE capability lines, so the limitation is the missing standalone LLAPI field rather than lack of HE support.
steps:
- id: step1
  action: exec
  target: STA
  command: cat /sys/class/net/wl0/address | tr 'a-f' 'A-F' | sed 's/^/StaMac=/'
  capture: sta_identity
- id: step2
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"
  depends_on: step1
  capture: assoc_entry
- id: step3
  action: exec
  target: DUT
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SupportedHe160MCS?" 2>&1 || true); printf '%s\n' "$OUT"; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/error=\1/p'; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/message=\2/p'
  depends_on: step2
  capture: result
- id: step4
  action: exec
  target: DUT
  command: >-
    ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | sed -n 's/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress="\([^"]*\)".*/SiblingAssocMac=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.RxSupportedHe160MCS="\([^"]*\)".*/DriverRxSupportedHe160MCS=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxSupportedHe160MCS="\([^"]*\)".*/DriverTxSupportedHe160MCS=\1/p'
  depends_on: step3
  capture: sibling_support
- id: step5
  action: exec
  target: DUT
  command: >-
    STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n 's/.*MACAddress="\([^"]*\)".*/\1/p'); STA_MAC_LOWER=$(echo "$STA_MAC" | tr 'A-F' 'a-f'); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC_LOWER | awk '/HE caps/ {he=1} /MCS SET/ {mcs=1} /HE SET/ {heset=1} END {if (he) print "DriverHeCapsPresent=1"; if (mcs) print "DriverMCSSetPresent=1"; if (heset) print "DriverHeSetPresent=1"}'
  depends_on: step4
  capture: driver_capability
pass_criteria:
- field: sta_identity.StaMac
  operator: regex
  value: ^([0-9A-F]{2}:){5}[0-9A-F]{2}$
  description: COM0 wl0 must resolve to a concrete live STA MAC before DUT-side validation.
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: assoc_entry.MACAddress
  operator: equals
  reference: sta_identity.StaMac
  description: AP1 AssociatedDevice.1 must correspond to the same COM0 wl0 station used for this manual checkpoint.
- field: result.error
  operator: equals
  value: '4'
  description: Standalone SupportedHe160MCS should fail with error 4 because the parameter is not exposed.
- field: result.message
  operator: contains
  value: parameter not found
  description: The not-supported readback should explicitly report parameter not found.
- field: sibling_support.SiblingAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Sibling field evidence must come from the same AssociatedDevice entry.
- field: sibling_support.DriverRxSupportedHe160MCS
  operator: regex
  value: ^[0-9]+(,[0-9]+)*$
  description: RxSupportedHe160MCS should still expose a concrete HE160 MCS list for the same STA.
- field: sibling_support.DriverTxSupportedHe160MCS
  operator: regex
  value: ^[0-9]+(,[0-9]+)*$
  description: TxSupportedHe160MCS should still expose a concrete HE160 MCS list for the same STA.
- field: driver_capability.DriverAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Driver capability evidence must target the same AssociatedDevice MAC resolved in step2.
- field: driver_capability.DriverHeCapsPresent
  operator: equals
  value: '1'
  description: wl0 sta_info must still expose HE capability data for the same STA.
- field: driver_capability.DriverMCSSetPresent
  operator: equals
  value: '1'
  description: wl0 sta_info must still expose an MCS SET line for the same STA.
- field: driver_capability.DriverHeSetPresent
  operator: equals
  value: '1'
  description: wl0 sta_info must still expose an HE SET line for the same STA.
verification_command:
  - 'cat /sys/class/net/wl0/address | tr ''a-f'' ''A-F'' | sed ''s/^/StaMac=/'''
  - 'OUT=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SupportedHe160MCS?" 2>&1 || true); printf ''%s\n'' "$OUT"; printf ''%s\n'' "$OUT" | sed -n ''s/.*failed (\([0-9][0-9]*\) - \(.*\))/error=\1/p''; printf ''%s\n'' "$OUT" | sed -n ''s/.*failed (\([0-9][0-9]*\) - \(.*\))/message=\2/p'''
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | sed -n ''s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress="\([^"]*\)".*/SiblingAssocMac=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.RxSupportedHe160MCS="\([^"]*\)".*/DriverRxSupportedHe160MCS=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxSupportedHe160MCS="\([^"]*\)".*/DriverTxSupportedHe160MCS=\1/p'''
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); STA_MAC_LOWER=$(echo "$STA_MAC" | tr ''A-F'' ''a-f''); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC_LOWER | awk ''/HE caps/ {he=1} /MCS SET/ {mcs=1} /HE SET/ {heset=1} END {if (he) print "DriverHeCapsPresent=1"; if (mcs) print "DriverMCSSetPresent=1"; if (heset) print "DriverHeSetPresent=1"}'''
results_reference:
  v4.0.3:
    5g: Not Supported
    6g: N/A
    2.4g: N/A
    comment: '5G serialwrap retest returned error 4 / parameter not found for SupportedHe160MCS, while the same AssociatedDevice entry still exposed RxSupportedHe160MCS="11,11,11,11" and TxSupportedHe160MCS="11,11,11,11", and wl0 sta_info for the same STA still exposed HE caps, MCS SET, and HE SET. Non-executed bands remain N/A until separately calibrated.'
