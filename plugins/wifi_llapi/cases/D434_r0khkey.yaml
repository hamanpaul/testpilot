pass_criteria:
- field: neighbour_baseline_5g.BaselineBssidCount5g
  operator: equals
  value: '0'
  description: 5G AP1 / wl0 should start with an empty neighbour BSSID list.
- field: neighbour_baseline_5g.BaselineChannelCount5g
  operator: equals
  value: '0'
  description: 5G AP1 / wl0 should start with an empty neighbour channel list.
- field: neighbour_baseline_5g.BaselineR0KHKeyCount5g
  operator: equals
  value: '0'
  description: 5G AP1 / wl0 should start with no neighbour R0KHKey line.
- field: neighbour_baseline_5g.BaselineBssid5g
  operator: equals
  value: ABSENT
  description: 5G AP1 / wl0 should have no neighbour BSSID at baseline.
- field: neighbour_baseline_5g.BaselineChannel5g
  operator: equals
  value: ABSENT
  description: 5G AP1 / wl0 should have no neighbour channel at baseline.
- field: neighbour_baseline_5g.BaselineR0KHKey5g
  operator: equals
  value: ABSENT
  description: 5G AP1 / wl0 should have no R0KHKey value at baseline.
- field: neighbour_add_5g.RequestedBssid5g
  operator: equals
  value: '11:22:33:44:55:66'
  description: 5G AP1 / wl0 should request the expected neighbour BSSID.
- field: neighbour_add_5g.RequestedChannel5g
  operator: equals
  value: '36'
  description: 5G AP1 / wl0 should request the expected neighbour channel.
- field: neighbour_after_add_5g.AfterAddBssidCount5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 should expose one neighbour BSSID after add.
- field: neighbour_after_add_5g.AfterAddChannelCount5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 should expose one neighbour channel after add.
- field: neighbour_after_add_5g.AfterAddR0KHKeyCount5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 should expose one neighbour R0KHKey line after add.
- field: neighbour_after_add_5g.AfterAddBssid5g
  operator: equals
  value: '11:22:33:44:55:66'
  description: 5G AP1 / wl0 should read back the added neighbour BSSID.
- field: neighbour_after_add_5g.AfterAddChannel5g
  operator: equals
  value: '36'
  description: 5G AP1 / wl0 should read back the added neighbour channel.
- field: neighbour_after_add_5g.AfterAddR0KHKey5g
