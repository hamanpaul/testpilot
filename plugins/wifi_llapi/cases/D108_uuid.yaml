id: wifi-llapi-D108-uuid
name: UUID — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 108
  object: WiFi.AccessPoint.{i}.WPS.
  api: UUID
  baseline: 0310-BGW720-300
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WPS.UUID?"
llapi_support: Support
implemented_by: pWHM
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (B0, AP role)
  Transport:
  - DUT via serialwrap COM0
  Baseline:
  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal
  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE
  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal
  Notes:
  - Workbook row 108 is UUID, not SelfPIN.
  - Live getter returns the same valid UUID on AP1/AP3/AP5.
  - Workbook keeps 6G Not Supported because wl1 hostapd has no uuid= projection while wl0/wl2 do.
steps:
- id: step1_5g
  action: exec
  target: DUT
  command:
    - 'echo "UUID5g=$(ubus-cli ''WiFi.AccessPoint.1.WPS.UUID?'' 2>/dev/null | grep -oE ''[0-9a-fA-F-]{36}'' | head -1)"'
    - 'echo "HostapdUuid5g=$(grep ''^uuid='' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"'
  capture: llapi_5g
- id: step2_6g
  action: exec
  target: DUT
  command:
    - 'echo "UUID6g=$(ubus-cli ''WiFi.AccessPoint.3.WPS.UUID?'' 2>/dev/null | grep -oE ''[0-9a-fA-F-]{36}'' | head -1)"'
    - 'echo "HostapdUuid6g=$(grep ''^uuid='' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"'
  capture: llapi_6g
- id: step3_24g
  action: exec
  target: DUT
  command:
    - 'echo "UUID24g=$(ubus-cli ''WiFi.AccessPoint.5.WPS.UUID?'' 2>/dev/null | grep -oE ''[0-9a-fA-F-]{36}'' | head -1)"'
    - 'echo "HostapdUuid24g=$(grep ''^uuid='' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"'
  capture: llapi_24g
pass_criteria:
- field: llapi_5g.UUID5g
  operator: regex
  value: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  band: 5g
  description: 5G UUID should be valid UUID format
- field: llapi_5g.HostapdUuid5g
  operator: regex
  value: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  band: 5g
  description: 5G hostapd uuid= should be present
- field: llapi_6g.UUID6g
  operator: regex
  value: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  band: 6g
  description: 6G UUID should be valid UUID format
- field: llapi_6g.HostapdUuid6g
  operator: equals
  value: ''
  band: 6g
  description: 6G hostapd should not project uuid=
- field: llapi_24g.UUID24g
  operator: regex
  value: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  band: 2.4g
  description: 2.4G UUID should be valid UUID format
- field: llapi_24g.HostapdUuid24g
  operator: regex
  value: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  band: 2.4g
  description: 2.4G hostapd uuid= should be present
verification_command:
  - 'cat /tmp/wl0_hapd.conf | grep uuid'
  - 'cat /tmp/wl1_hapd.conf | grep uuid'
  - 'cat /tmp/wl2_hapd.conf | grep uuid'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Not Supported
    2.4g: Pass
    comment: Getter returns a valid UUID on all bands, but workbook row 108 keeps 6G Not Supported because wl1 hostapd has no uuid= projection while wl0/wl2 do.
