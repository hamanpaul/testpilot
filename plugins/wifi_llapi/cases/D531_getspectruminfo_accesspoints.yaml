id: d531-spectruminfo-accesspoints
name: D531 getSpectrumInfo accesspoints
source:
  row: 531
  object: WiFi.Radio.{i}.
  api: getSpectrumInfo()
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
