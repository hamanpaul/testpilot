id: d354-radio-enable
name: D354 Radio Sensing Enable
source:
  row: 354
  object: WiFi.Radio.{i}.Sensing.
  api: Enable
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step1_sensing_default_5g
  target: dut
  action: read
  band: 5g
  capture: default_5g
  command: ubus-cli "WiFi.Radio.1.Sensing.Enable?"
  expected: 預設 Sensing.Enable 維持啟用
  description: Radio.1 (5g) 讀取預設 Sensing.Enable
- id: step2_sensing_set_disable_5g
  target: dut
  action: exec
  band: 5g
  capture: set_disable_5g
  command: ubus-cli WiFi.Radio.1.Sensing.Enable=0
  expected: Sensing.Enable setter 回傳停用狀態
  description: Radio.1 (5g) 依 workbook setter intent 設為 0
- id: step3_sensing_after_disable_5g
  target: dut
  action: read
  band: 5g
  capture: after_disable_5g
  command: ubus-cli "WiFi.Radio.1.Sensing.Enable?"
  expected: 停用後 readback 為 0
  description: Radio.1 (5g) 驗證停用後的 Sensing.Enable
- id: step4_sensing_restore_5g
  target: dut
  action: exec
  band: 5g
  capture: restore_5g
  command: ubus-cli WiFi.Radio.1.Sensing.Enable=1
  expected: Sensing.Enable setter 回傳還原狀態
  description: Radio.1 (5g) 還原 Sensing.Enable 為 1
- id: step5_sensing_after_restore_5g
  target: dut
  action: read
  band: 5g
  capture: after_restore_5g
  command: ubus-cli "WiFi.Radio.1.Sensing.Enable?"
  expected: 還原後 readback 為 1
  description: Radio.1 (5g) 驗證還原後的 Sensing.Enable
- id: step6_sensing_default_6g
  target: dut
  action: read
  band: 6g
  capture: default_6g
  command: ubus-cli "WiFi.Radio.2.Sensing.Enable?"
  expected: 預設 Sensing.Enable 維持啟用
  description: Radio.2 (6g) 讀取預設 Sensing.Enable
- id: step7_sensing_set_disable_6g
  target: dut
  action: exec
  band: 6g
  capture: set_disable_6g
  command: ubus-cli WiFi.Radio.2.Sensing.Enable=0
  expected: Sensing.Enable setter 回傳停用狀態
  description: Radio.2 (6g) 依 workbook setter intent 設為 0
- id: step8_sensing_after_disable_6g
  target: dut
  action: read
  band: 6g
  capture: after_disable_6g
  command: ubus-cli "WiFi.Radio.2.Sensing.Enable?"
  expected: 停用後 readback 為 0
  description: Radio.2 (6g) 驗證停用後的 Sensing.Enable
- id: step9_sensing_restore_6g
  target: dut
  action: exec
  band: 6g
  capture: restore_6g
  command: ubus-cli WiFi.Radio.2.Sensing.Enable=1
  expected: Sensing.Enable setter 回傳還原狀態
  description: Radio.2 (6g) 還原 Sensing.Enable 為 1
- id: step10_sensing_after_restore_6g
  target: dut
  action: read
  band: 6g
  capture: after_restore_6g
  command: ubus-cli "WiFi.Radio.2.Sensing.Enable?"
  expected: 還原後 readback 為 1
  description: Radio.2 (6g) 驗證還原後的 Sensing.Enable
- id: step11_sensing_default_24g
  target: dut
  action: read
  band: 2.4g
  capture: default_24g
  command: ubus-cli "WiFi.Radio.3.Sensing.Enable?"
  expected: 預設 Sensing.Enable 維持啟用
  description: Radio.3 (2.4g) 讀取預設 Sensing.Enable
- id: step12_sensing_set_disable_24g
  target: dut
  action: exec
  band: 2.4g
  capture: set_disable_24g
  command: ubus-cli WiFi.Radio.3.Sensing.Enable=0
  expected: Sensing.Enable setter 回傳停用狀態
  description: Radio.3 (2.4g) 依 workbook setter intent 設為 0
- id: step13_sensing_after_disable_24g
  target: dut
  action: read
  band: 2.4g
  capture: after_disable_24g
  command: ubus-cli "WiFi.Radio.3.Sensing.Enable?"
  expected: 停用後 readback 為 0
  description: Radio.3 (2.4g) 驗證停用後的 Sensing.Enable
- id: step14_sensing_restore_24g
  target: dut
  action: exec
  band: 2.4g
  capture: restore_24g
  command: ubus-cli WiFi.Radio.3.Sensing.Enable=1
  expected: Sensing.Enable setter 回傳還原狀態
  description: Radio.3 (2.4g) 還原 Sensing.Enable 為 1
